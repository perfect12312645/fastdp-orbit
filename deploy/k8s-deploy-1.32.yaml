                      items:
                        description: ServiceLoadBalancerIPBlock represents a single allowed
                          LoadBalancer IP CIDR block.
                        properties:
                          cidr:
                            type: string
                        type: object
                      type: array
                  type: object
              type: object
          served: true
          storage: true
      status:
        acceptedNames:
          kind: ""
          plural: ""
        conditions: []
        storedVersions: []
      ---
