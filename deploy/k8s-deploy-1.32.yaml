  - name: restart kubelet
    module: systemd
    params: '{"name":"kubelet","action":"restart"}'
workflowTemplates:
  - name: repo-nginx.conf
    description: 离线本地软件仓库配置
    content: |
      worker_processes 1;
      events {
          worker_connections  1024;
      }

      # --- 软件仓库 HTTP 服务（仅master0节点包含）---
      {{if eq (index .Groups.k8s_master0 0).ip .Machine.ip}}
      http {
          server {
              listen {{ .GlobalVariable.repository_port }};
              location / {
                  root {{ .GlobalVariable.repository_dir }};
                  autoindex on;
              }
          }
      }
      {{end}}
  - name: daemon.json
    description: Docker 守护进程配置文件，配置镜像加速源、cgroup 驱动、日志驱动、存储驱动、私有仓库、容器默认限制等，docker 服务启动时加载。
    content: |-
      {
        "exec-opts": ["native.cgroupdriver=systemd"],
        "registry-mirrors": ["https://docker.1ms.run"],
        "insecure-registries": ["registry.pf.com:5000"],
        "default-runtime": "runc",
        "max-concurrent-downloads": 10,
        "log-driver":"json-file",
        "log-level": "warn",
        "log-opts": {
          "max-size": "50m",
          "max-file": "5"
        },
        "iptables": false,
        "storage-driver": "overlay2",
        "data-root": "{{ .GlobalVariable.docker_data }}"
      }
  - name: etcd.sh
    description: etcdctl声明变量脚本
    content: |-
      export ETCDCTL_DIAL_TIMEOUT=3s
      export ETCDCTL_CACERT=/etc/kubernetes/pki/etcd/ca.pem
      export ETCDCTL_CERT=/etc/kubernetes/pki/etcd/etcd.pem
      export ETCDCTL_KEY=/etc/kubernetes/pki/etcd/etcd-key.pem
      export ETCDCTL_API=3
      export ETCDCTL_ENDPOINTS="{{range $index, $value := .Groups.etcd}}{{if $index}},{{end}}{{$value.ip}}:2379{{end}}"
  - name: etcd.yaml
    description: ETCD 集群运行参数配置文件，定义集群节点列表、数据存储目录、TLS 证书路径、心跳 / 选举超时、监听内外网地址等，供 etcd.service 加载使用。
    content: |-
      name: "etcd-{{ .Machine.hostname | lower }}"
      data-dir: {{ .GlobalVariable.etcd_data }}
      wal-dir: {{ .GlobalVariable.etcd_data }}/wal
      snapshot-count: 5000
      heartbeat-interval: 100
      election-timeout: 1000
      quota-backend-bytes: 0
      listen-peer-urls: 'https://{{ .Machine.ip }}:2380'
      listen-client-urls: 'https://{{ .Machine.ip }}:2379,http://127.0.0.1:2379'
      max-snapshots: 3
      max-wals: 5
      cors:
      initial-advertise-peer-urls: 'https://{{ .Machine.ip }}:2380'
      advertise-client-urls: 'https://{{ .Machine.ip }}:2379'
      discovery:
      discovery-fallback: 'proxy'
      discovery-proxy:
      discovery-srv:
      initial-cluster: '{{range $idx, $node := .Groups.k8s_etcd}}{{if $idx}},{{end}}etcd-{{$node.hostname | lower}}=https://{{$node.ip}}:2380{{end}}'
      initial-cluster-token: 'etcd-k8s-cluster'
      initial-cluster-state: 'new'
      strict-reconfig-check: false
      enable-v2: true
      enable-pprof: true
      proxy: 'off'
      proxy-failure-wait: 5000
      proxy-refresh-interval: 30000
      proxy-dial-timeout: 1000
      proxy-write-timeout: 5000
      proxy-read-timeout: 0
      client-transport-security:
        cert-file: '/etc/kubernetes/pki/etcd/etcd.pem'
        key-file: '/etc/kubernetes/pki/etcd/etcd-key.pem'
        client-cert-auth: true
        trusted-ca-file: '/etc/kubernetes/pki/etcd/ca.pem'
        auto-tls: true
      peer-transport-security:
        cert-file: '/etc/kubernetes/pki/etcd/etcd.pem'
        key-file: '/etc/kubernetes/pki/etcd/etcd-key.pem'
        peer-client-cert-auth: true
        trusted-ca-file: '/etc/kubernetes/pki/etcd/ca.pem'
        auto-tls: true
      debug: false
      log-package-levels:
      log-outputs: [default]
      force-new-cluster: false
  - name: admin.conf
    description: 集群超级管理员凭证，包含集群根 CA、管理员客户端证书私钥，用于运维执行 kubectl 集群管理操作
    content: |-
      apiVersion: v1
      kind: Config
      clusters:
        - name: kubernetes
          cluster:
            certificate-authority-data: {{ lookup "/etc/kubernetes/pki/ca.pem" | b64encode }}
            server: https://127.0.0.1:6443
      contexts:
        - name: kubernetes-admin@kubernetes
          context:
            cluster: kubernetes
            user: kubernetes-admin
      users:
        - name: kubernetes-admin
          user:
            client-certificate-data: {{ lookup "/etc/kubernetes/pki/admin.pem" | b64encode }}
            client-key-data: {{ lookup "/etc/kubernetes/pki/admin-key.pem" | b64encode }}
      current-context: kubernetes-admin@kubernetes
  - name: apiserver-csr.json
    description: kube-apiserver TLS 证书请求模板，包含所有 master 节点 IP、主机名、集群服务域名 SAN，用于签发 apiserver 服务端证书。
    content: |+
      {
          "CN":"kube-apiserver",
          "hosts":["10.96.0.1","127.0.0.1"{{range $index, $value := .Groups.k8s_master}},"{{$value.ip}}"{{end}}{{range $index, $value := .Groups.k8s_master}},"{{$value.hostname}}"{{end}},"kubernetes","kubernetes.default","kubernetes.default.svc","kubernetes.default.svc.cluster","kubernetes.default.svc.cluster.local"],
          "key":{"algo":"rsa","size":2048},
          "names":[{"C":"CN","L":"BeiJing","ST":"BeiJing","O":"Kubernetes","OU":"Kubernetes"}]
      }

  - name: bootstrap-kubelet.conf
    description: 节点 kubelet 初始化引导配置，内置 bootstrap token，新节点首次接入集群时用于申请正式节点证书，全节点下发。
    content: |-
      apiVersion: v1
      kind: Config
      clusters:
        - name: kubernetes
          cluster:
            certificate-authority-data: {{ lookup "/etc/kubernetes/pki/ca.pem" | b64encode }}
            server: https://127.0.0.1:6443
      contexts:
        - name: tls-bootstrap-token-user@kubernetes
          context:
            cluster: kubernetes
            user: tls-bootstrap-token-user
      users:
        - name: tls-bootstrap-token-user
          user:
            token: l6fy8c.d683399b7a553977
      current-context: tls-bootstrap-token-user@kubernetes
  - name: bootstrap.secret.yaml
    description: 集群节点引导 token 密钥，kubelet 初始化认证凭证，创建于 kube-system 命名空间，开启节点证书签发权限。
    content: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: bootstrap-token-l6fy8c
        namespace: kube-system
      type: bootstrap.kubernetes.io/token
      stringData:
        description: "The default bootstrap token generated by 'kubelet '."
        token-id: l6fy8c
        token-secret: d683399b7a553977
        usage-bootstrap-authentication: "true"
        usage-bootstrap-signing: "true"
        auth-extra-groups:  system:bootstrappers:default-node-token,system:bootstrappers:worker,system:bootstrappers:ingress
       
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: kubelet-bootstrap
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: system:node-bootstrapper
      subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: Group
        name: system:bootstrappers:default-node-token
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: node-autoapprove-bootstrap
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: system:certificates.k8s.io:certificatesigningrequests:nodeclient
      subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: Group
        name: system:bootstrappers:default-node-token
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: node-autoapprove-certificate-rotation
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: system:certificates.k8s.io:certificatesigningrequests:selfnodeclient
      subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: Group
        name: system:nodes
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        annotations:
          rbac.authorization.kubernetes.io/autoupdate: "true"
        labels:
          kubernetes.io/bootstrapping: rbac-defaults
        name: system:kube-apiserver-to-kubelet
      rules:
        - apiGroups:
            - ""
          resources:
            - nodes/proxy
            - nodes/stats
            - nodes/log
            - nodes/spec
            - nodes/metrics
          verbs:
            - "*"
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: system:kube-apiserver
        namespace: ""
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: system:kube-apiserver-to-kubelet
      subjects:
        - apiGroup: rbac.authorization.k8s.io
          kind: User
          name: kube-apiserver
  - name: etcd-pf-csr.json
    description: ETCD 集群 TLS 证书请求模板，填充全部 etcd 节点地址，签发 etcd 服务端 / 客户端双向认证证书。
    content: |-
      {
          "CN": "etcd-pf",
          "key": {"algo": "rsa", "size": 2048},
          "hosts": ["127.0.0.1"{{range $index, $value := .Groups.k8s_etcd}},"{{$value.ip}}"{{end}}{{range $index, $value := .Groups.k8s_etcd}},"{{$value.hostname}}"{{end}}],
          "names": [{"C": "CN", "L": "beijing", "O": "etcd", "ST": "beijing", "OU": "System"}]
      }
  - name: kube-proxy.conf
    description: kube-proxy 组件认证文件，集群所有节点通用，代理组件使用该凭证同步 Service 规则生成网络转发策略。
    content: |-
      apiVersion: v1
      kind: Config
      clusters:
        - name: kubernetes
          cluster:
            certificate-authority-data: {{ lookup "/etc/kubernetes/pki/ca.pem" | b64encode }}
            server: https://127.0.0.1:6443
      contexts:
        - name: kube-proxy@kubernetes
          context:
            cluster: kubernetes
            user: kube-proxy
      users:
        - name: kube-proxy
          user:
            client-certificate-data: {{ lookup "/etc/kubernetes/pki/kube-proxy.pem" | b64encode }}
            client-key-data: {{ lookup "/etc/kubernetes/pki/kube-proxy-key.pem" | b64encode }}
      current-context: kube-proxy@kubernetes
  - name: scheduler.conf
    description: kube-scheduler 调度器认证配置，调度组件通过该文件鉴权访问 apiserver，完成 Pod 调度绑定节点。
    content: |-
      apiVersion: v1
      kind: Config
      clusters:
        - name: kubernetes
          cluster:
            certificate-authority-data: {{ lookup "/etc/kubernetes/pki/ca.pem" | b64encode }}
            server: https://127.0.0.1:6443
      contexts:
        - name: system:kube-scheduler@kubernetes
          context:
            cluster: kubernetes
            user: system:kube-scheduler
      users:
        - name: system:kube-scheduler
          user:
            client-certificate-data: {{ lookup "/etc/kubernetes/pki/scheduler.pem" | b64encode }}
            client-key-data: {{ lookup "/etc/kubernetes/pki/scheduler-key.pem" | b64encode }}
      current-context: system:kube-scheduler@kubernetes
  - name: etcd.service
    description: ETCD 数据库集群服务，存储集群全部资源持久化数据，开启 TLS 双向加密通信。
    content: |-
      [Unit]
      Description=Etcd Service
      Documentation=https://etcd.io/docs/v3.5/op-guide/clustering/
      After=network.target

      [Service]
      Type=notify
      ExecStart=/usr/local/bin/etcd --config-file=/etc/etcd/etcd.yaml
      Restart=on-failure
      RestartSec=10
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target
      Alias=etcd3.service
  - name: cri-docker.service
    description: CRI 容器运行时服务，对接 docker 提供标准容器接口，kubelet 依赖该服务管理容器。
    content: |-
      [Unit]
      Description=CRI Interface for Docker Engine
      After=network.target

      [Service]
      Type=notify
      ExecStart=/usr/local/bin/cri-dockerd --network-plugin=cni --pod-infra-container-image=registry.pf.com:5000/pause:3.6
      Restart=always
      RestartSec=5
      StartLimitBurst=3
      StartLimitInterval=60s

      [Install]
      WantedBy=multi-user.target
  - name: docker.service
    description: Docker 容器引擎系统服务，负责镜像拉取、容器启停、网络存储驱动。
    content: |-
      [Unit]
      Description=Docker Application Container Engine
      Documentation=https://docs.docker.com
      After=network-online.target firewalld.service
      Wants=network-online.target
      [Service]
      Type=notify
      ExecStart=/usr/local/bin/dockerd
      ExecReload=/bin/kill -s HUP $MAINPID
      LimitNOFILE=infinity
      LimitNPROC=infinity
      TimeoutStartSec=0
      Delegate=yes
      KillMode=process
      Restart=on-failure
      StartLimitBurst=3
      StartLimitInterval=60s
      [Install]
      WantedBy=multi-user.target
  - name: kube-nginx.service
    description: 本地四层负载均衡服务，监听 127.0.0.1:6443，转发至 master apiserver，统一节点访问入口。
    content: |-
      [Unit]
      Description=kube-apiserver nginx proxy
      After=network.target
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=forking
      ExecStartPre=/usr/local/nginx/sbin/nginx -c /usr/local/nginx/conf/kube-nginx.conf -p /usr/local/nginx -t
      ExecStart=/usr/local/nginx/sbin/nginx -c /usr/local/nginx/conf/kube-nginx.conf -p /usr/local/nginx
      ExecReload=/usr/local/nginx/sbin/nginx -c /usr/local/nginx/conf/kube-nginx.conf -p /usr/local/nginx -s reload
      PrivateTmp=true
      Restart=always
      RestartSec=5
      StartLimitInterval=0
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target
  - name: k8s-apiserver-lb.conf
    description: Nginx 四层 LB 配置模板，仅包含 stream 转发逻辑，负责本地 6443 端口流量转发多 master apiserver。
    content: "# --- K8s Master LB ---\nstream {\n    upstream backend {\n    \t  least_conn;\n        hash $remote_addr consistent;\n        {{ range $index, $value := .Groups.k8s_master }}\n        server {{ $value.ip }}:6443        max_fails=3 fail_timeout=30s;\n        {{ end }}\n    }\n    server {\n        listen 127.0.0.1:6443;\n        proxy_connect_timeout 1s;\n        proxy_timeout 3s;\n        proxy_next_upstream on;                 # 开启故障转移\n        proxy_next_upstream_timeout 0;          # 无超时限制，持续尝试下一个节点\n        proxy_next_upstream_tries 3; \n        proxy_pass backend;\n    }\n}"
  - name: kube-apiserver.service
    description: API 服务 systemd 配置，定义启动参数、证书、网段、鉴权开关、监听地址，集群核心入口服务。
    content: |
      [Unit]
      Description=Kubernetes API Server
      Documentation=https://github.com/kubernetes/kubernetes
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/kube-apiserver \
            --v=2  \
            --allow-privileged=true  \
            --bind-address={{ .Machine.ip }} \
            --secure-port=6443  \
            --advertise-address={{ .Machine.ip }} \
            --service-cluster-ip-range={{ .GlobalVariable.service_cidr }} \
            --service-node-port-range=8000-32767  \
            --etcd-servers='{{range $index, $value := .Groups.k8s_etcd}}{{if $index}},{{end}}https://{{$value.ip}}:2379{{end}}'  \
            --etcd-cafile=/etc/kubernetes/pki/etcd/ca.pem  \
            --etcd-certfile=/etc/kubernetes/pki/etcd/etcd.pem  \
            --etcd-keyfile=/etc/kubernetes/pki/etcd/etcd-key.pem  \
            --client-ca-file=/etc/kubernetes/pki/ca.pem  \
            --tls-cert-file=/etc/kubernetes/pki/apiserver.pem  \
            --tls-private-key-file=/etc/kubernetes/pki/apiserver-key.pem  \
            --kubelet-client-certificate=/etc/kubernetes/pki/apiserver.pem  \
            --kubelet-client-key=/etc/kubernetes/pki/apiserver-key.pem  \
            --service-account-key-file=/etc/kubernetes/pki/sa.pub  \
            --service-account-signing-key-file=/etc/kubernetes/pki/sa.key  \
            --service-account-issuer=https://kubernetes.default.svc.cluster.local \
            --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname  \
            --enable-admission-plugins=NamespaceLifecycle,LimitRanger,ServiceAccount,DefaultStorageClass,DefaultTolerationSeconds,NodeRestriction,ResourceQuota  \
            --authorization-mode=Node,RBAC  \
            --enable-bootstrap-token-auth=true  \
            --requestheader-client-ca-file=/etc/kubernetes/pki/front-proxy-ca.pem  \
            --proxy-client-cert-file=/etc/kubernetes/pki/front-proxy-client.pem  \
            --proxy-client-key-file=/etc/kubernetes/pki/front-proxy-client-key.pem  \
            --requestheader-allowed-names=aggregator,front-proxy-client  \
            --requestheader-group-headers=X-Remote-Group  \
            --requestheader-extra-headers-prefix=X-Remote-Extra-  \
            --requestheader-username-headers=X-Remote-User
            # --token-auth-file=/etc/kubernetes/token.csv

      Restart=on-failure
      RestartSec=10s
      LimitNOFILE=65535

      [Install]
      WantedBy=multi-user.target
  - name: kube-controller-manager.service
    description: 控制器管理器服务单元，处理证书签发、节点管理、资源控制器逻辑，修复集群各类资源状态。
    content: |
      [Unit]
      Description=Kubernetes Controller Manager
      Documentation=https://github.com/kubernetes/kubernetes
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/kube-controller-manager \
            --v=2 \
            --bind-address=127.0.0.1 \
            --root-ca-file=/etc/kubernetes/pki/ca.pem \
            --cluster-signing-cert-file=/etc/kubernetes/pki/ca.pem \
            --cluster-signing-key-file=/etc/kubernetes/pki/ca-key.pem \
            --service-account-private-key-file=/etc/kubernetes/pki/sa.key \
            --kubeconfig=/etc/kubernetes/controller-manager.conf \
            --leader-elect=true \
            --use-service-account-credentials=true \
            --node-monitor-grace-period=40s \
            --node-monitor-period=5s \
            --controllers=*,bootstrapsigner,tokencleaner \
            --allocate-node-cidrs=true \
            --cluster-cidr={{ .GlobalVariable.pod_cidr }} \
            --requestheader-client-ca-file=/etc/kubernetes/pki/front-proxy-ca.pem \
            --node-cidr-mask-size=24
            
      Restart=always
      RestartSec=10s

      [Install]
      WantedBy=multi-user.target
  - name: kube-scheduler.service
    description: 调度器服务单元，负责将未调度 Pod 匹配至可用 Node，多 master 通过 leader 选举单实例运行。
    content: |
      [Unit]
      Description=Kubernetes Scheduler
      Documentation=https://github.com/kubernetes/kubernetes
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/kube-scheduler \
            --v=2 \
            --bind-address=127.0.0.1 \
            --leader-elect=true \
            --kubeconfig=/etc/kubernetes/scheduler.conf

      Restart=always
      RestartSec=10s

      [Install]
      WantedBy=multi-user.target
  - name: kubelet-conf.yml
    description: kubelet 运行参数配置文件，定义容器运行时、证书目录、节点注册、镜像拉取、资源驱逐策略。
    content: |-
      apiVersion: kubelet.config.k8s.io/v1beta1
      kind: KubeletConfiguration
      address: 0.0.0.0
      port: 10250
      readOnlyPort: 10255
      authentication:
        anonymous:
          enabled: false
        webhook:
          cacheTTL: 2m0s
          enabled: true
        x509:
          clientCAFile: /etc/kubernetes/pki/ca.pem
      authorization:
        mode: Webhook
        webhook:
          cacheAuthorizedTTL: 5m0s
          cacheUnauthorizedTTL: 30s
      cgroupDriver: systemd
      cgroupsPerQOS: true
      clusterDNS:
      - {{ .GlobalVariable.clusterdns }}
      clusterDomain: cluster.local
      containerLogMaxFiles: 5
      containerLogMaxSize: 10Mi
      contentType: application/vnd.kubernetes.protobuf
      cpuCFSQuota: true
      cpuManagerPolicy: none
      cpuManagerReconcilePeriod: 10s
      enableControllerAttachDetach: true
      enableDebuggingHandlers: true
      enforceNodeAllocatable:
      - pods
      eventBurst: 10
      eventRecordQPS: 5
      evictionHard:
        imagefs.available: 15%
        memory.available: 100Mi
        nodefs.available: 10%
        nodefs.inodesFree: 5%
      evictionPressureTransitionPeriod: 5m0s  #缩小相应的配置
      failSwapOn: true
      fileCheckFrequency: 20s
      hairpinMode: promiscuous-bridge
      healthzBindAddress: 127.0.0.1
      healthzPort: 10248
      httpCheckFrequency: 20s
      imageGCHighThresholdPercent: 85
      imageGCLowThresholdPercent: 80
      imageMinimumGCAge: 2m0s
      iptablesDropBit: 15
      iptablesMasqueradeBit: 14
      kubeAPIBurst: 10
      kubeAPIQPS: 5
      makeIPTablesUtilChains: true
      maxOpenFiles: 1000000
      maxPods: 110
      nodeStatusUpdateFrequency: 10s
      oomScoreAdj: -999
      podPidsLimit: -1
      registryBurst: 10
      registryPullQPS: 5
      resolvConf: /etc/resolv.conf
      rotateCertificates: true
      runtimeRequestTimeout: 2m0s
      serializeImagePulls: true
      staticPodPath: /etc/kubernetes/manifests
      streamingConnectionIdleTimeout: 4h0m0s
      syncFrequency: 1m0s
      volumeStatsAggPeriod: 1m0s
  - name: kubelet.service
    description: 节点代理服务单元，管理本机容器生命周期、上报节点状态、接收调度 Pod 创建指令，全节点部署。
    content: |
      [Unit]
      Description=Kubernetes Kubelet
      Documentation=https://github.com/kubernetes/kubernetes
      After=cri-docker.service network-online.target

      [Service]
      ExecStart=/usr/local/bin/kubelet \
          --bootstrap-kubeconfig=/etc/kubernetes/bootstrap-kubelet.conf \
          --kubeconfig=/etc/kubernetes/kubelet.conf \
          --config=/etc/kubernetes/kubelet-conf.yml \
          --root-dir={{ .GlobalVariable.kubelet_data }} \
          --container-runtime-endpoint=unix:///run/cri-dockerd.sock \
          --node-labels=node.kubernetes.io/node=worker
      Restart=always
      StartLimitInterval=0
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
  - name: kube-proxy.yml
    description: kube-proxy 运行配置，设置代理模式、集群 service 网段、同步间隔、ipvs 参数。
    content: |
      apiVersion: kubeproxy.config.k8s.io/v1alpha1
      bindAddress: 0.0.0.0
      clientConnection:
        acceptContentTypes: ""
        burst: 10
        contentType: application/vnd.kubernetes.protobuf
        kubeconfig: /etc/kubernetes/kube-proxy.conf   #kube-proxy引导文件
        qps: 5
      clusterCIDR: {{ .GlobalVariable.pod_cidr }}
      configSyncPeriod: 15m0s
      conntrack:
        max: null
        maxPerCore: 32768
        min: 131072
        tcpCloseWaitTimeout: 1h0m0s
        tcpEstablishedTimeout: 24h0m0s
      enableProfiling: false
      healthzBindAddress: 0.0.0.0:10256
      hostnameOverride: ""
      iptables:
        masqueradeAll: false
        masqueradeBit: 14
        minSyncPeriod: 0s
        syncPeriod: 30s
      ipvs:
        masqueradeAll: true
        minSyncPeriod: 5s
        scheduler: "rr"
        syncPeriod: 30s
      kind: KubeProxyConfiguration
      metricsBindAddress: 127.0.0.1:10249
      mode: "ipvs"
      nodePortAddresses: null
      oomScoreAdj: -999
      portRange: ""
      udpIdleTimeout: 250ms
  - name: kube-proxy.service
    description: 网络代理服务单元，同步 Service 与 Endpoint，生成 iptables/ipvs 负载均衡转发规则。
    content: |-
      [Unit]
      Description=Kubernetes Kube Proxy
      Documentation=https://github.com/kubernetes/kubernetes
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/kube-proxy \
        --config=/etc/kubernetes/kube-proxy.yml \
        --v=2

      Restart=always
      RestartSec=10s

      [Install]
      WantedBy=multi-user.target
  - name: calico.yaml
    description: Calico CNI 网络插件资源清单，提供集群 Pod 互通网络、网络策略、IP 地址管理。
    content: |
      ---
      # Source: calico/templates/calico-kube-controllers.yaml
      # This manifest creates a Pod Disruption Budget for Controller to allow K8s Cluster Autoscaler to evict

      apiVersion: policy/v1
      kind: PodDisruptionBudget
      metadata:
        name: calico-kube-controllers
        namespace: kube-system
        labels:
          k8s-app: calico-kube-controllers
      spec:
        maxUnavailable: 1
        selector:
          matchLabels:
            k8s-app: calico-kube-controllers
      ---
      # Source: calico/templates/calico-kube-controllers.yaml
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: calico-kube-controllers
        namespace: kube-system
      ---
      # Source: calico/templates/calico-node.yaml
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: calico-node
        namespace: kube-system
      ---
      # Source: calico/templates/calico-node.yaml
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: calico-cni-plugin
        namespace: kube-system
      ---
      # Source: calico/templates/calico-config.yaml
      # This ConfigMap is used to configure a self-hosted Calico installation.
      kind: ConfigMap
      apiVersion: v1
      metadata:
        name: calico-config
        namespace: kube-system
      data:
        # Typha is disabled.
        typha_service_name: "none"
        # Configure the backend to use.
        calico_backend: "bird"

        # Configure the MTU to use for workload interfaces and tunnels.
        # By default, MTU is auto-detected, and explicitly setting this field should not be required.
        # You can override auto-detection by providing a non-zero value.
        veth_mtu: "0"

        # The CNI network configuration to install on each node. The special
        # values in this config will be automatically populated.
        cni_network_config: |-
          {
            "name": "k8s-pod-network",
            "cniVersion": "0.3.1",
            "plugins": [
              {
                "type": "calico",
                "log_level": "info",
                "log_file_path": "/var/log/calico/cni/cni.log",
                "datastore_type": "kubernetes",
                "nodename": "__KUBERNETES_NODE_NAME__",
                "mtu": __CNI_MTU__,
                "ipam": {
                    "type": "calico-ipam"
                },
                "policy": {
                    "type": "k8s"
                },
                "kubernetes": {
                    "kubeconfig": "__KUBECONFIG_FILEPATH__"
                }
              },
              {
                "type": "portmap",
                "snat": true,
                "capabilities": {"portMappings": true}
              },
              {
                "type": "bandwidth",
                "capabilities": {"bandwidth": true}
              }
            ]
          }
      ---
      # Source: calico/templates/kdd-crds.yaml
      apiVersion: apiextensions.k8s.io/v1
