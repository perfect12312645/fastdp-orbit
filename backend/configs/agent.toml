# Orbit Agent 配置文件
# 配置文件路径: /etc/fastdp-orbit/agent.toml

[orbit-agent]
# Agent监听地址 + 上报给Server的IP（不能是0.0.0.0或127.0.0.1）
host = "192.168.1.100"
# Agent gRPC端口
port = 8700
# Server gRPC地址
rpcserver_host = "192.168.1.100"
# Server gRPC端口
rpcserver_port = 9090
# 集群准入Token（与Server配置的token相同）
token = "fastdp-orbit-token-change-me"
# 心跳间隔(秒)
heartbeat = 20

# gRPC TLS配置（双向TLS）
[orbit-agent.tls]
enabled = true
cert_file = "/etc/fastdp-orbit/certs/agent/grpc.crt"
key_file = "/etc/fastdp-orbit/certs/agent/grpc.key"
ca_file = "/etc/fastdp-orbit/certs/ca.crt"

[log]
# 日志级别: debug, info, warn, error
level = "info"
# 输出方式: stdout, file, both
output = "both"
# 日志文件路径 (当output=file或both时生效)
path = "./logs/agent.log"
# 单个日志文件最大MB
max_size = 100
# 最多保留备份文件数
max_backups = 30
# 日志文件保留天数
max_age = 30
# 是否压缩旧日志
compress = true
