    module: systemd
    params: '{"name":"NetworkManager","action":"restart"}'
  - name: reload sysctl parameters
    module: shell
    params: '{"command":"sysctl --system"}'
  - name: systemctl daemon-reload
    module: systemd
    params: '{"name":"","action":"reload"}'
  - name: restart_chronyd
    module: systemd
    params: '{"name":"chronyd","action":"restart"}'
  - name: restart_docker
    module: systemd
    params: '{"name":"docker","action":"restart"}'
  - name: restart_kube-nginx
    module: systemd
    params: '{"name":"kube-nginx","action":"restart"}'
  - name: restart_etcd
    module: systemd
