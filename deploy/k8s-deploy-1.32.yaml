        acceptedNames:
          kind: ""
          plural: ""
        conditions: null
        storedVersions: null
      ---
      # Source: calico/templates/calico-kube-controllers-rbac.yaml
      # Include a clusterrole for the kube-controllers component,
      # and bind it to the calico-kube-controllers serviceaccount.
      kind: ClusterRole
      apiVersion: rbac.authorization.k8s.io/v1
      metadata:
        name: calico-kube-controllers
      rules:
        # Nodes are watched to monitor for deletions.
        - apiGroups: [""]
          resources:
            - nodes
          verbs:
            - watch
            - list
            - get
        # Pods are watched to check for existence as part of IPAM controller.
        - apiGroups: [""]
          resources:
            - pods
          verbs:
            - get
            - list
            - watch
        # IPAM resources are manipulated in response to node and block updates, as well as periodic triggers.
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - ipreservations
          verbs:
            - list
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - blockaffinities
            - ipamblocks
            - ipamhandles
            - tiers
          verbs:
            - get
            - list
            - create
            - update
            - delete
            - watch
        # Pools are watched to maintain a mapping of blocks to IP pools.
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - ippools
          verbs:
            - list
            - watch
        # kube-controllers manages hostendpoints.
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - hostendpoints
          verbs:
            - get
            - list
            - create
            - update
            - delete
        # Needs access to update clusterinformations.
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - clusterinformations
          verbs:
            - get
            - list
            - create
            - update
            - watch
        # KubeControllersConfiguration is where it gets its config
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - kubecontrollersconfigurations
          verbs:
            # read its own config
            - get
            # create a default if none exists
            - create
            # update status
            - update
            # watch for changes
            - watch
      ---
      # Source: calico/templates/calico-node-rbac.yaml
      # Include a clusterrole for the calico-node DaemonSet,
      # and bind it to the calico-node serviceaccount.
      kind: ClusterRole
      apiVersion: rbac.authorization.k8s.io/v1
      metadata:
        name: calico-node
      rules:
        # Used for creating service account tokens to be used by the CNI plugin
        - apiGroups: [""]
          resources:
            - serviceaccounts/token
          resourceNames:
            - calico-cni-plugin
          verbs:
            - create
        # The CNI plugin needs to get pods, nodes, and namespaces.
        - apiGroups: [""]
          resources:
            - pods
            - nodes
            - namespaces
          verbs:
            - get
        # EndpointSlices are used for Service-based network policy rule
        # enforcement.
        - apiGroups: ["discovery.k8s.io"]
          resources:
            - endpointslices
          verbs:
            - watch
            - list
        - apiGroups: [""]
          resources:
            - endpoints
            - services
          verbs:
            # Used to discover service IPs for advertisement.
            - watch
            - list
            # Used to discover Typhas.
            - get
        # Pod CIDR auto-detection on kubeadm needs access to config maps.
        - apiGroups: [""]
          resources:
            - configmaps
          verbs:
            - get
        - apiGroups: [""]
          resources:
            - nodes/status
          verbs:
            # Needed for clearing NodeNetworkUnavailable flag.
            - patch
            # Calico stores some configuration information in node annotations.
            - update
        # Watch for changes to Kubernetes NetworkPolicies.
        - apiGroups: ["networking.k8s.io"]
          resources:
            - networkpolicies
          verbs:
            - watch
            - list
        # Watch for changes to Kubernetes AdminNetworkPolicies.
        - apiGroups: ["policy.networking.k8s.io"]
          resources:
            - adminnetworkpolicies
          verbs:
            - watch
            - list
        # Used by Calico for policy information.
        - apiGroups: [""]
          resources:
            - pods
            - namespaces
            - serviceaccounts
          verbs:
            - list
            - watch
        # The CNI plugin patches pods/status.
        - apiGroups: [""]
          resources:
            - pods/status
          verbs:
            - patch
        # Calico monitors various CRDs for config.
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - globalfelixconfigs
            - felixconfigurations
            - bgppeers
            - bgpfilters
            - globalbgpconfigs
            - bgpconfigurations
            - ippools
            - ipreservations
            - ipamblocks
            - globalnetworkpolicies
            - globalnetworksets
            - networkpolicies
            - networksets
            - clusterinformations
            - hostendpoints
            - blockaffinities
            - caliconodestatuses
            - tiers
          verbs:
            - get
            - list
            - watch
         # Calico creates some tiers on startup.
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - tiers
          verbs:
            - create
        # Calico must create and update some CRDs on startup.
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - ippools
            - felixconfigurations
            - clusterinformations
          verbs:
            - create
            - update
        # Calico must update some CRDs.
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - caliconodestatuses
          verbs:
            - update
        # Calico stores some configuration information on the node.
        - apiGroups: [""]
          resources:
            - nodes
          verbs:
            - get
            - list
            - watch
        # These permissions are only required for upgrade from v2.6, and can
        # be removed after upgrade or on fresh installations.
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - bgpconfigurations
            - bgppeers
          verbs:
            - create
            - update
        # These permissions are required for Calico CNI to perform IPAM allocations.
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - blockaffinities
            - ipamblocks
            - ipamhandles
          verbs:
            - get
            - list
            - create
            - update
            - delete
        # The CNI plugin and calico/node need to be able to create a default
        # IPAMConfiguration
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - ipamconfigs
          verbs:
            - get
            - create
        # Block affinities must also be watchable by confd for route aggregation.
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - blockaffinities
          verbs:
            - watch
        # The Calico IPAM migration needs to get daemonsets. These permissions can be
        # removed if not upgrading from an installation using host-local IPAM.
        - apiGroups: ["apps"]
          resources:
            - daemonsets
          verbs:
            - get
      ---
      # Source: calico/templates/calico-node-rbac.yaml
      # CNI cluster role
      kind: ClusterRole
      apiVersion: rbac.authorization.k8s.io/v1
      metadata:
        name: calico-cni-plugin
      rules:
        - apiGroups: [""]
          resources:
            - pods
            - nodes
            - namespaces
          verbs:
            - get
        - apiGroups: [""]
          resources:
            - pods/status
          verbs:
            - patch
        - apiGroups: ["crd.projectcalico.org"]
          resources:
            - blockaffinities
            - ipamblocks
            - ipamhandles
            - clusterinformations
            - ippools
            - ipreservations
            - ipamconfigs
          verbs:
            - get
            - list
            - create
            - update
            - delete
      ---
      # Source: calico/templates/calico-kube-controllers-rbac.yaml
      kind: ClusterRoleBinding
      apiVersion: rbac.authorization.k8s.io/v1
      metadata:
        name: calico-kube-controllers
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: calico-kube-controllers
      subjects:
      - kind: ServiceAccount
        name: calico-kube-controllers
        namespace: kube-system
      ---
      # Source: calico/templates/calico-node-rbac.yaml
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: calico-node
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: calico-node
      subjects:
      - kind: ServiceAccount
        name: calico-node
        namespace: kube-system
      ---
      # Source: calico/templates/calico-node-rbac.yaml
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: calico-cni-plugin
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: calico-cni-plugin
      subjects:
      - kind: ServiceAccount
        name: calico-cni-plugin
        namespace: kube-system
      ---
      # Source: calico/templates/calico-node.yaml
      # This manifest installs the calico-node container, as well
      # as the CNI plugins and network config on
      # each master and worker node in a Kubernetes cluster.
      kind: DaemonSet
      apiVersion: apps/v1
      metadata:
        name: calico-node
        namespace: kube-system
        labels:
          k8s-app: calico-node
      spec:
        selector:
          matchLabels:
            k8s-app: calico-node
        updateStrategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 1
        template:
          metadata:
            labels:
              k8s-app: calico-node
          spec:
            nodeSelector:
              kubernetes.io/os: linux
            hostNetwork: true
            tolerations:
              # Make sure calico-node gets scheduled on all nodes.
              - effect: NoSchedule
                operator: Exists
              # Mark the pod as a critical add-on for rescheduling.
              - key: CriticalAddonsOnly
                operator: Exists
              - effect: NoExecute
                operator: Exists
            serviceAccountName: calico-node
            securityContext:
              seccompProfile:
                type: RuntimeDefault
            # Minimize downtime during a rolling upgrade or deletion; tell Kubernetes to do a "force
            # deletion": https://kubernetes.io/docs/concepts/workloads/pods/pod/#termination-of-pods.
            terminationGracePeriodSeconds: 0
            priorityClassName: system-node-critical
            initContainers:
              # This container performs upgrade from host-local IPAM to calico-ipam.
              # It can be deleted if this is a fresh installation, or if you have already
              # upgraded to use calico-ipam.
              - name: upgrade-ipam
                image: registry.pf.com:5000/calico/cni:v3.29.1
                imagePullPolicy: IfNotPresent
                command: ["/opt/cni/bin/calico-ipam", "-upgrade"]
                envFrom:
                - configMapRef:
                    # Allow KUBERNETES_SERVICE_HOST and KUBERNETES_SERVICE_PORT to be overridden for eBPF mode.
                    name: kubernetes-services-endpoint
                    optional: true
                env:
                  - name: KUBERNETES_NODE_NAME
                    valueFrom:
                      fieldRef:
                        fieldPath: spec.nodeName
                  - name: CALICO_NETWORKING_BACKEND
                    valueFrom:
                      configMapKeyRef:
                        name: calico-config
                        key: calico_backend
                volumeMounts:
                  - mountPath: /var/lib/cni/networks
                    name: host-local-net-dir
                  - mountPath: /host/opt/cni/bin
                    name: cni-bin-dir
                securityContext:
                  privileged: true
              # This container installs the CNI binaries
              # and CNI network config file on each node.
              - name: install-cni
                image: registry.pf.com:5000/calico/cni:v3.29.1
                imagePullPolicy: IfNotPresent
                command: ["/opt/cni/bin/install"]
                envFrom:
                - configMapRef:
                    # Allow KUBERNETES_SERVICE_HOST and KUBERNETES_SERVICE_PORT to be overridden for eBPF mode.
                    name: kubernetes-services-endpoint
                    optional: true
                env:
                  # Name of the CNI config file to create.
                  - name: CNI_CONF_NAME
                    value: "10-calico.conflist"
                  # The CNI network config to install on each node.
                  - name: CNI_NETWORK_CONFIG
                    valueFrom:
                      configMapKeyRef:
                        name: calico-config
                        key: cni_network_config
                  # Set the hostname based on the k8s node name.
                  - name: KUBERNETES_NODE_NAME
                    valueFrom:
                      fieldRef:
                        fieldPath: spec.nodeName
                  # CNI MTU Config variable
                  - name: CNI_MTU
                    valueFrom:
                      configMapKeyRef:
                        name: calico-config
                        key: veth_mtu
                  # Prevents the container from sleeping forever.
                  - name: SLEEP
                    value: "false"
                volumeMounts:
                  - mountPath: /host/opt/cni/bin
                    name: cni-bin-dir
                  - mountPath: /host/etc/cni/net.d
                    name: cni-net-dir
                securityContext:
                  privileged: true
              # This init container mounts the necessary filesystems needed by the BPF data plane
              # i.e. bpf at /sys/fs/bpf and cgroup2 at /run/calico/cgroup. Calico-node initialisation is executed
              # in best effort fashion, i.e. no failure for errors, to not disrupt pod creation in iptable mode.
              - name: "mount-bpffs"
                image: registry.pf.com:5000/calico/node:v3.29.1
                imagePullPolicy: IfNotPresent
                command: ["calico-node", "-init", "-best-effort"]
                volumeMounts:
                  - mountPath: /sys/fs
                    name: sys-fs
                    # Bidirectional is required to ensure that the new mount we make at /sys/fs/bpf propagates to the host
                    # so that it outlives the init container.
                    mountPropagation: Bidirectional
                  - mountPath: /var/run/calico
                    name: var-run-calico
                    # Bidirectional is required to ensure that the new mount we make at /run/calico/cgroup propagates to the host
                    # so that it outlives the init container.
                    mountPropagation: Bidirectional
                  # Mount /proc/ from host which usually is an init program at /nodeproc. It's needed by mountns binary,
                  # executed by calico-node, to mount root cgroup2 fs at /run/calico/cgroup to attach CTLB programs correctly.
                  - mountPath: /nodeproc
                    name: nodeproc
                    readOnly: true
                securityContext:
                  privileged: true
            containers:
              # Runs calico-node container on each Kubernetes node. This
              # container programs network policy and routes on each
              # host.
              - name: calico-node
                image: registry.pf.com:5000/calico/node:v3.29.1
                imagePullPolicy: IfNotPresent
                envFrom:
                - configMapRef:
                    # Allow KUBERNETES_SERVICE_HOST and KUBERNETES_SERVICE_PORT to be overridden for eBPF mode.
                    name: kubernetes-services-endpoint
                    optional: true
                env:
                  # Use Kubernetes API as the backing datastore.
                  - name: DATASTORE_TYPE
                    value: "kubernetes"
                  # Wait for the datastore.
                  - name: WAIT_FOR_DATASTORE
                    value: "true"
                  # Set based on the k8s node name.
                  - name: NODENAME
                    valueFrom:
                      fieldRef:
                        fieldPath: spec.nodeName
                  # Choose the backend to use.
                  - name: CALICO_NETWORKING_BACKEND
                    valueFrom:
                      configMapKeyRef:
                        name: calico-config
                        key: calico_backend
                  # Cluster type to identify the deployment type
                  - name: CLUSTER_TYPE
                    value: "k8s,bgp"
                  # Auto-detect the BGP IP address.
                  - name: IP
                    value: "autodetect"
                  # Enable IPIP
                  - name: CALICO_IPV4POOL_IPIP
                    value: "{{ .GlobalVariable.calico_ipipmode }}"
                  # Enable or Disable VXLAN on the default IP pool.
                  - name: CALICO_IPV4POOL_VXLAN
                    value: "{{ .GlobalVariable.calico_vxlanmode }}"
                  # Enable or Disable VXLAN on the default IPv6 IP pool.
                  - name: CALICO_IPV6POOL_VXLAN
                    value: "Never"
                  # Set MTU for tunnel device used if ipip is enabled
                  - name: FELIX_IPINIPMTU
                    valueFrom:
                      configMapKeyRef:
                        name: calico-config
                        key: veth_mtu
                  # Set MTU for the VXLAN tunnel device.
                  - name: FELIX_VXLANMTU
                    valueFrom:
                      configMapKeyRef:
                        name: calico-config
                        key: veth_mtu
                  # Set MTU for the Wireguard tunnel device.
                  - name: FELIX_WIREGUARDMTU
                    valueFrom:
                      configMapKeyRef:
                        name: calico-config
                        key: veth_mtu
                  # The default IPv4 pool to create on startup if none exists. Pod IPs will be
                  # chosen from this range. Changing this value after installation will have
                  # no effect. This should fall within `--cluster-cidr`.
                  - name: CALICO_IPV4POOL_CIDR
                    value: "{{ .GlobalVariable.pod_cidr }}"
                  # Disable file logging so `kubectl logs` works.
                  - name: CALICO_DISABLE_FILE_LOGGING
                    value: "true"
                  # Set Felix endpoint to host default action to ACCEPT.
                  - name: FELIX_DEFAULTENDPOINTTOHOSTACTION
                    value: "ACCEPT"
                  # Disable IPv6 on Kubernetes.
                  - name: FELIX_IPV6SUPPORT
                    value: "false"
                  - name: FELIX_HEALTHENABLED
                    value: "true"
                securityContext:
                  privileged: true
                resources:
                  requests:
                    cpu: 250m
                lifecycle:
                  preStop:
                    exec:
                      command:
                      - /bin/calico-node
                      - -shutdown
                livenessProbe:
                  exec:
                    command:
                    - /bin/calico-node
                    - -felix-live
                    - -bird-live
                  periodSeconds: 10
                  initialDelaySeconds: 10
                  failureThreshold: 6
                  timeoutSeconds: 10
                readinessProbe:
                  exec:
                    command:
                    - /bin/calico-node
                    - -felix-ready
                    - -bird-ready
                  periodSeconds: 10
                  timeoutSeconds: 10
                volumeMounts:
                  # For maintaining CNI plugin API credentials.
                  - mountPath: /host/etc/cni/net.d
                    name: cni-net-dir
                    readOnly: false
                  - mountPath: /lib/modules
                    name: lib-modules
                    readOnly: true
                  - mountPath: /run/xtables.lock
                    name: xtables-lock
                    readOnly: false
                  - mountPath: /var/run/calico
                    name: var-run-calico
                    readOnly: false
                  - mountPath: /var/lib/calico
                    name: var-lib-calico
                    readOnly: false
                  - name: policysync
                    mountPath: /var/run/nodeagent
                  # For eBPF mode, we need to be able to mount the BPF filesystem at /sys/fs/bpf so we mount in the
                  # parent directory.
                  - name: bpffs
                    mountPath: /sys/fs/bpf
                  - name: cni-log-dir
                    mountPath: /var/log/calico/cni
                    readOnly: true
            volumes:
              # Used by calico-node.
              - name: lib-modules
                hostPath:
                  path: /lib/modules
              - name: var-run-calico
                hostPath:
                  path: /var/run/calico
                  type: DirectoryOrCreate
              - name: var-lib-calico
                hostPath:
                  path: /var/lib/calico
                  type: DirectoryOrCreate
              - name: xtables-lock
                hostPath:
                  path: /run/xtables.lock
                  type: FileOrCreate
              - name: sys-fs
                hostPath:
                  path: /sys/fs/
                  type: DirectoryOrCreate
              - name: bpffs
                hostPath:
                  path: /sys/fs/bpf
                  type: Directory
              # mount /proc at /nodeproc to be used by mount-bpffs initContainer to mount root cgroup2 fs.
              - name: nodeproc
                hostPath:
                  path: /proc
              # Used to install CNI.
              - name: cni-bin-dir
                hostPath:
                  path: /opt/cni/bin
                  type: DirectoryOrCreate
              - name: cni-net-dir
                hostPath:
                  path: /etc/cni/net.d
              # Used to access CNI logs.
              - name: cni-log-dir
                hostPath:
                  path: /var/log/calico/cni
              # Mount in the directory for host-local IPAM allocations. This is
              # used when upgrading from host-local to calico-ipam, and can be removed
              # if not using the upgrade-ipam init container.
              - name: host-local-net-dir
                hostPath:
                  path: /var/lib/cni/networks
              # Used to create per-pod Unix Domain Sockets
              - name: policysync
                hostPath:
                  type: DirectoryOrCreate
                  path: /var/run/nodeagent
      ---
      # Source: calico/templates/calico-kube-controllers.yaml
      # See https://github.com/projectcalico/kube-controllers
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: calico-kube-controllers
        namespace: kube-system
        labels:
          k8s-app: calico-kube-controllers
      spec:
        # The controllers can only have a single active instance.
        replicas: 1
        selector:
          matchLabels:
            k8s-app: calico-kube-controllers
        strategy:
          type: Recreate
        template:
          metadata:
            name: calico-kube-controllers
            namespace: kube-system
            labels:
              k8s-app: calico-kube-controllers
          spec:
            nodeSelector:
              kubernetes.io/os: linux
            tolerations:
              # Mark the pod as a critical add-on for rescheduling.
              - key: CriticalAddonsOnly
                operator: Exists
              - key: node-role.kubernetes.io/master
                effect: NoSchedule
              - key: node-role.kubernetes.io/control-plane
                effect: NoSchedule
            serviceAccountName: calico-kube-controllers
            securityContext:
              seccompProfile:
                type: RuntimeDefault
            priorityClassName: system-cluster-critical
            containers:
              - name: calico-kube-controllers
                image: registry.pf.com:5000/calico/kube-controllers:v3.29.1
                imagePullPolicy: IfNotPresent
                env:
                  # Choose which controllers to run.
                  - name: ENABLED_CONTROLLERS
                    value: node
                  - name: DATASTORE_TYPE
                    value: kubernetes
                livenessProbe:
                  exec:
                    command:
                    - /usr/bin/check-status
                    - -l
                  periodSeconds: 10
                  initialDelaySeconds: 10
                  failureThreshold: 6
                  timeoutSeconds: 10
                readinessProbe:
                  exec:
                    command:
                    - /usr/bin/check-status
                    - -r
                  periodSeconds: 10
                securityContext:
                  runAsNonRoot: true
  - name: deploy.sh
    description: Deploys CoreDNS to a cluster currently running Kube-DNS
    content: |
      #!/bin/bash

      # Deploys CoreDNS to a cluster currently running Kube-DNS.

      show_help () {
      cat << USAGE
      usage: $0 [ -r REVERSE-CIDR ] [ -i DNS-IP ] [ -d CLUSTER-DOMAIN ] [ -t YAML-TEMPLATE ]

          -r : Define a reverse zone for the given CIDR. You may specify this option more
               than once to add multiple reverse zones. If no reverse CIDRs are defined,
               then the default is to handle all reverse zones (i.e. in-addr.arpa and ip6.arpa)
          -i : Specify the cluster DNS IP address. If not specified, the IP address of
               the existing "kube-dns" service is used, if present.
          -s : Skips the translation of kube-dns configmap to the corresponding CoreDNS Corefile configuration.

      USAGE
      exit 0
      }

      # Simple Defaults
      DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" >/dev/null && pwd )"
      CLUSTER_DOMAIN=cluster.local
      YAML_TEMPLATE="$DIR/coredns.yaml.sed"
      STUBDOMAINS=""
      UPSTREAM=\\/etc\\/resolv\.conf

      # Translates the kube-dns ConfigMap to equivalent CoreDNS Configuration.
      function translate-kube-dns-configmap {
          kube-dns-upstreamnameserver-to-coredns
          kube-dns-stubdomains-to-coredns
      }

      function kube-dns-upstreamnameserver-to-coredns {
        up=$(kubectl -n kube-system get configmap kube-dns  -ojsonpath='{.data.upstreamNameservers}' 2> /dev/null | tr -d '[",]')
        if [[ ! -z ${up} ]]; then
          UPSTREAM=${up}
        fi
      }

      function kube-dns-stubdomains-to-coredns {
        STUBDOMAIN_TEMPLATE='
          SD_DOMAIN:53 {
            errors
            cache 30
            loop
            forward . SD_DESTINATION {
              max_concurrent 1000
            }
          }'

        function dequote {
          str=${1#\"} # delete leading quote
          str=${str%\"} # delete trailing quote
          echo ${str}
        }

        function parse_stub_domains() {
          sd=$1

        # get keys - each key is a domain
        sd_keys=$(echo -n $sd | jq keys[])

        # For each domain ...
        for dom in $sd_keys; do
          dst=$(echo -n $sd | jq '.['$dom'][0]') # get the destination

          dom=$(dequote $dom)
          dst=$(dequote $dst)

          sd_stanza=${STUBDOMAIN_TEMPLATE/SD_DOMAIN/$dom} # replace SD_DOMAIN
          sd_stanza=${sd_stanza/SD_DESTINATION/$dst} # replace SD_DESTINATION
          echo "$sd_stanza"
        done
      }

        sd=$(kubectl -n kube-system get configmap kube-dns  -ojsonpath='{.data.stubDomains}' 2> /dev/null)
        STUBDOMAINS=$(parse_stub_domains "$sd")
      }


      # Get Opts
      while getopts "hsr:i:d:t:k:" opt; do
          case "$opt" in
          h)  show_help
              ;;
          s)  SKIP=1
              ;;
          r)  REVERSE_CIDRS="$REVERSE_CIDRS $OPTARG"
              ;;
          i)  CLUSTER_DNS_IP=$OPTARG
              ;;
          d)  CLUSTER_DOMAIN=$OPTARG
              ;;
          t)  YAML_TEMPLATE=$OPTARG
              ;;
          esac
      done

      # Conditional Defaults
      if [[ -z $REVERSE_CIDRS ]]; then
        REVERSE_CIDRS="in-addr.arpa ip6.arpa"
      fi
      if [[ -z $CLUSTER_DNS_IP ]]; then
        # Default IP to kube-dns IP
        CLUSTER_DNS_IP=$(kubectl get service --namespace kube-system kube-dns -o jsonpath="{.spec.clusterIP}")
        if [ $? -ne 0 ]; then
            >&2 echo "Error! The IP address for DNS service couldn't be determined automatically. Please specify the DNS-IP with the '-i' option."
            exit 2
        fi
      fi

      if [[ "${SKIP}" -ne 1 ]] ; then
          translate-kube-dns-configmap
      fi

      orig=$'\n'
      replace=$'\\\n'
      sed -e "s/CLUSTER_DNS_IP/$CLUSTER_DNS_IP/g" \
          -e "s/CLUSTER_DOMAIN/$CLUSTER_DOMAIN/g" \
          -e "s?REVERSE_CIDRS?$REVERSE_CIDRS?g" \
          -e "s@STUBDOMAINS@${STUBDOMAINS//$orig/$replace}@g" \
          -e "s/UPSTREAMNAMESERVER/$UPSTREAM/g" \
          "${YAML_TEMPLATE}"
  - name: coredns.yaml.sed
    description: 集群 DNS 组件模板，提供服务域名解析，替换集群 service 网段后部署，负责集群内部域名解析。
    content: |
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: coredns
        namespace: kube-system
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        labels:
          kubernetes.io/bootstrapping: rbac-defaults
        name: system:coredns
      rules:
      - apiGroups:
        - ""
        resources:
        - endpoints
        - services
        - pods
        - namespaces
        verbs:
        - list
        - watch
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        annotations:
          rbac.authorization.kubernetes.io/autoupdate: "true"
        labels:
          kubernetes.io/bootstrapping: rbac-defaults
        name: system:coredns
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: system:coredns
      subjects:
      - kind: ServiceAccount
        name: coredns
        namespace: kube-system
      ---
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: coredns
        namespace: kube-system
      data:
        Corefile: |
          .:53 {
              errors
              health {
                lameduck 5s
              }
              ready
              kubernetes CLUSTER_DOMAIN REVERSE_CIDRS {
                fallthrough in-addr.arpa ip6.arpa
              }
              prometheus :9153
              forward . UPSTREAMNAMESERVER {
                max_concurrent 1000
              }
              cache 30
              loop
              reload
              loadbalance
          }STUBDOMAINS
      ---
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: coredns
        namespace: kube-system
        labels:
          k8s-app: kube-dns
          kubernetes.io/name: "CoreDNS"
      spec:
        # replicas: not specified here:
        # 1. Default is 1.
        # 2. Will be tuned in real time if DNS horizontal auto-scaling is turned on.
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 1
        selector:
          matchLabels:
            k8s-app: kube-dns
        template:
          metadata:
            labels:
              k8s-app: kube-dns
          spec:
            priorityClassName: system-cluster-critical
            serviceAccountName: coredns
            tolerations:
              - key: "CriticalAddonsOnly"
                operator: "Exists"
            nodeSelector:
              kubernetes.io/os: linux
            affinity:
               podAntiAffinity:
                 preferredDuringSchedulingIgnoredDuringExecution:
                 - weight: 100
                   podAffinityTerm:
                     labelSelector:
                       matchExpressions:
                         - key: k8s-app
                           operator: In
                           values: ["kube-dns"]
                     topologyKey: kubernetes.io/hostname
            containers:
            - name: coredns
              image: registry.pf.com:5000/coredns/coredns:1.8.0
              imagePullPolicy: IfNotPresent
              resources:
                limits:
                  memory: 170Mi
                requests:
                  cpu: 100m
                  memory: 70Mi
              args: [ "-conf", "/etc/coredns/Corefile" ]
              volumeMounts:
              - name: config-volume
                mountPath: /etc/coredns
                readOnly: true
              ports:
              - containerPort: 53
                name: dns
                protocol: UDP
              - containerPort: 53
                name: dns-tcp
                protocol: TCP
              - containerPort: 9153
                name: metrics
                protocol: TCP
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  add:
                  - NET_BIND_SERVICE
                  drop:
                  - all
                readOnlyRootFilesystem: true
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8080
                  scheme: HTTP
                initialDelaySeconds: 60
                timeoutSeconds: 5
                successThreshold: 1
                failureThreshold: 5
              readinessProbe:
                httpGet:
                  path: /ready
                  port: 8181
                  scheme: HTTP
            dnsPolicy: Default
            volumes:
              - name: config-volume
                configMap:
                  name: coredns
                  items:
                  - key: Corefile
                    path: Corefile
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: kube-dns
        namespace: kube-system
        annotations:
          prometheus.io/port: "9153"
          prometheus.io/scrape: "true"
        labels:
          k8s-app: kube-dns
          kubernetes.io/cluster-service: "true"
          kubernetes.io/name: "CoreDNS"
      spec:
        selector:
          k8s-app: kube-dns
        clusterIP: CLUSTER_DNS_IP
        ports:
        - name: dns
          port: 53
          protocol: UDP
        - name: dns-tcp
          port: 53
          protocol: TCP
        - name: metrics
          port: 9153
          protocol: TCP
  - name: controller-manager.conf
    description: kube-controller-manager 专属认证配置，携带 controller-manager 专用客户端证书，用于和 apiserver 交互执行控制器逻辑。
    content: |-
      apiVersion: v1
      kind: Config
      clusters:
        - name: kubernetes
          cluster:
            certificate-authority-data: {{ lookup "/etc/kubernetes/pki/ca.pem" | b64encode }}
            server: https://127.0.0.1:6443
      contexts:
        - name: system:kube-controller-manager@kubernetes
          context:
            cluster: kubernetes
            user: system:kube-controller-manager
      users:
        - name: system:kube-controller-manager
          user:
            client-certificate-data: {{ lookup "/etc/kubernetes/pki/controller-manager.pem" | b64encode }}
            client-key-data: {{ lookup "/etc/kubernetes/pki/controller-manager-key.pem" | b64encode }}
      current-context: system:kube-controller-manager@kubernetes
  - name: kubectl.sh
    description: kubectl命令自动补全脚本
    content: |

      # Copyright 2016 The Kubernetes Authors.
      #
      # Licensed under the Apache License, Version 2.0 (the "License");
      # you may not use this file except in compliance with the License.
      # You may obtain a copy of the License at
      #
      #     http://www.apache.org/licenses/LICENSE-2.0
      #
      # Unless required by applicable law or agreed to in writing, software
      # distributed under the License is distributed on an "AS IS" BASIS,
      # WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
      # See the License for the specific language governing permissions and
      # limitations under the License.
      # bash completion V2 for kubectl                              -*- shell-script -*-

      __kubectl_debug()
      {
          if [[ -n ${BASH_COMP_DEBUG_FILE-} ]]; then
              echo "$*" >> "${BASH_COMP_DEBUG_FILE}"
          fi
      }

      # Macs have bash3 for which the bash-completion package doesn't include
      # _init_completion. This is a minimal version of that function.
      __kubectl_init_completion()
      {
          COMPREPLY=()
          _get_comp_words_by_ref "$@" cur prev words cword
      }

      # This function calls the kubectl program to obtain the completion
      # results and the directive.  It fills the 'out' and 'directive' vars.
      __kubectl_get_completion_results() {
          local requestComp lastParam lastChar args

          # Prepare the command to request completions for the program.
          # Calling ${words[0]} instead of directly kubectl allows handling aliases
          args=("${words[@]:1}")
          requestComp="${words[0]} __complete ${args[*]}"

          lastParam=${words[$((${#words[@]}-1))]}
          lastChar=${lastParam:$((${#lastParam}-1)):1}
          __kubectl_debug "lastParam ${lastParam}, lastChar ${lastChar}"

          if [[ -z ${cur} && ${lastChar} != = ]]; then
              # If the last parameter is complete (there is a space following it)
              # We add an extra empty parameter so we can indicate this to the go method.
              __kubectl_debug "Adding extra empty parameter"
              requestComp="${requestComp} ''"
          fi

          # When completing a flag with an = (e.g., kubectl -n=<TAB>)
          # bash focuses on the part after the =, so we need to remove
          # the flag part from $cur
          if [[ ${cur} == -*=* ]]; then
              cur="${cur#*=}"
          fi

          __kubectl_debug "Calling ${requestComp}"
          # Use eval to handle any environment variables and such
          out=$(eval "${requestComp}" 2>/dev/null)

          # Extract the directive integer at the very end of the output following a colon (:)
          directive=${out##*:}
          # Remove the directive
          out=${out%:*}
          if [[ ${directive} == "${out}" ]]; then
              # There is not directive specified
              directive=0
          fi
          __kubectl_debug "The completion directive is: ${directive}"
          __kubectl_debug "The completions are: ${out}"
      }

      __kubectl_process_completion_results() {
          local shellCompDirectiveError=1
          local shellCompDirectiveNoSpace=2
          local shellCompDirectiveNoFileComp=4
          local shellCompDirectiveFilterFileExt=8
          local shellCompDirectiveFilterDirs=16
          local shellCompDirectiveKeepOrder=32

          if (((directive & shellCompDirectiveError) != 0)); then
              # Error code.  No completion.
              __kubectl_debug "Received error from custom completion go code"
              return
          else
              if (((directive & shellCompDirectiveNoSpace) != 0)); then
                  if [[ $(type -t compopt) == builtin ]]; then
                      __kubectl_debug "Activating no space"
                      compopt -o nospace
                  else
                      __kubectl_debug "No space directive not supported in this version of bash"
                  fi
              fi
              if (((directive & shellCompDirectiveKeepOrder) != 0)); then
                  if [[ $(type -t compopt) == builtin ]]; then
                      # no sort isn't supported for bash less than < 4.4
                      if [[ ${BASH_VERSINFO[0]} -lt 4 || ( ${BASH_VERSINFO[0]} -eq 4 && ${BASH_VERSINFO[1]} -lt 4 ) ]]; then
                          __kubectl_debug "No sort directive not supported in this version of bash"
                      else
                          __kubectl_debug "Activating keep order"
                          compopt -o nosort
                      fi
                  else
                      __kubectl_debug "No sort directive not supported in this version of bash"
                  fi
              fi
              if (((directive & shellCompDirectiveNoFileComp) != 0)); then
                  if [[ $(type -t compopt) == builtin ]]; then
                      __kubectl_debug "Activating no file completion"
                      compopt +o default
                  else
                      __kubectl_debug "No file completion directive not supported in this version of bash"
                  fi
              fi
          fi

          # Separate activeHelp from normal completions
          local completions=()
          local activeHelp=()
          __kubectl_extract_activeHelp

          if (((directive & shellCompDirectiveFilterFileExt) != 0)); then
              # File extension filtering
              local fullFilter filter filteringCmd

              # Do not use quotes around the $completions variable or else newline
              # characters will be kept.
              for filter in ${completions[*]}; do
                  fullFilter+="$filter|"
              done

              filteringCmd="_filedir $fullFilter"
              __kubectl_debug "File filtering command: $filteringCmd"
              $filteringCmd
          elif (((directive & shellCompDirectiveFilterDirs) != 0)); then
              # File completion for directories only

              local subdir
              subdir=${completions[0]}
              if [[ -n $subdir ]]; then
                  __kubectl_debug "Listing directories in $subdir"
                  pushd "$subdir" >/dev/null 2>&1 && _filedir -d && popd >/dev/null 2>&1 || return
              else
                  __kubectl_debug "Listing directories in ."
                  _filedir -d
              fi
          else
              __kubectl_handle_completion_types
          fi

          __kubectl_handle_special_char "$cur" :
          __kubectl_handle_special_char "$cur" =

          # Print the activeHelp statements before we finish
          if ((${#activeHelp[*]} != 0)); then
              printf "\n";
              printf "%s\n" "${activeHelp[@]}"
              printf "\n"

              # The prompt format is only available from bash 4.4.
              # We test if it is available before using it.
              if (x=${PS1@P}) 2> /dev/null; then
                  printf "%s" "${PS1@P}${COMP_LINE[@]}"
              else
                  # Can't print the prompt.  Just print the
                  # text the user had typed, it is workable enough.
                  printf "%s" "${COMP_LINE[@]}"
              fi
          fi
      }

      # Separate activeHelp lines from real completions.
      # Fills the $activeHelp and $completions arrays.
      __kubectl_extract_activeHelp() {
          local activeHelpMarker="_activeHelp_ "
          local endIndex=${#activeHelpMarker}

          while IFS='' read -r comp; do
              if [[ ${comp:0:endIndex} == $activeHelpMarker ]]; then
                  comp=${comp:endIndex}
                  __kubectl_debug "ActiveHelp found: $comp"
                  if [[ -n $comp ]]; then
                      activeHelp+=("$comp")
                  fi
              else
                  # Not an activeHelp line but a normal completion
                  completions+=("$comp")
              fi
          done <<<"${out}"
      }

      __kubectl_handle_completion_types() {
          __kubectl_debug "__kubectl_handle_completion_types: COMP_TYPE is $COMP_TYPE"

          case $COMP_TYPE in
          37|42)
              # Type: menu-complete/menu-complete-backward and insert-completions
              # If the user requested inserting one completion at a time, or all
              # completions at once on the command-line we must remove the descriptions.
              # https://github.com/spf13/cobra/issues/1508
              local tab=$'\t' comp
              while IFS='' read -r comp; do
                  [[ -z $comp ]] && continue
                  # Strip any description
                  comp=${comp%%$tab*}
                  # Only consider the completions that match
                  if [[ $comp == "$cur"* ]]; then
                      COMPREPLY+=("$comp")
                  fi
              done < <(printf "%s\n" "${completions[@]}")
              ;;

          *)
              # Type: complete (normal completion)
              __kubectl_handle_standard_completion_case
              ;;
          esac
      }

      __kubectl_handle_standard_completion_case() {
          local tab=$'\t' comp

          # Short circuit to optimize if we don't have descriptions
          if [[ "${completions[*]}" != *$tab* ]]; then
              IFS=$'\n' read -ra COMPREPLY -d '' < <(compgen -W "${completions[*]}" -- "$cur")
              return 0
          fi

          local longest=0
          local compline
          # Look for the longest completion so that we can format things nicely
          while IFS='' read -r compline; do
              [[ -z $compline ]] && continue
              # Strip any description before checking the length
              comp=${compline%%$tab*}
              # Only consider the completions that match
              [[ $comp == "$cur"* ]] || continue
              COMPREPLY+=("$compline")
              if ((${#comp}>longest)); then
                  longest=${#comp}
              fi
          done < <(printf "%s\n" "${completions[@]}")

          # If there is a single completion left, remove the description text
          if ((${#COMPREPLY[*]} == 1)); then
              __kubectl_debug "COMPREPLY[0]: ${COMPREPLY[0]}"
              comp="${COMPREPLY[0]%%$tab*}"
              __kubectl_debug "Removed description from single completion, which is now: ${comp}"
              COMPREPLY[0]=$comp
          else # Format the descriptions
              __kubectl_format_comp_descriptions $longest
          fi
      }

      __kubectl_handle_special_char()
      {
          local comp="$1"
          local char=$2
          if [[ "$comp" == *${char}* && "$COMP_WORDBREAKS" == *${char}* ]]; then
              local word=${comp%"${comp##*${char}}"}
              local idx=${#COMPREPLY[*]}
              while ((--idx >= 0)); do
                  COMPREPLY[idx]=${COMPREPLY[idx]#"$word"}
              done
          fi
      }

      __kubectl_format_comp_descriptions()
      {
          local tab=$'\t'
          local comp desc maxdesclength
          local longest=$1

          local i ci
          for ci in ${!COMPREPLY[*]}; do
              comp=${COMPREPLY[ci]}
              # Properly format the description string which follows a tab character if there is one
              if [[ "$comp" == *$tab* ]]; then
                  __kubectl_debug "Original comp: $comp"
                  desc=${comp#*$tab}
                  comp=${comp%%$tab*}

                  # $COLUMNS stores the current shell width.
                  # Remove an extra 4 because we add 2 spaces and 2 parentheses.
                  maxdesclength=$(( COLUMNS - longest - 4 ))

                  # Make sure we can fit a description of at least 8 characters
                  # if we are to align the descriptions.
                  if ((maxdesclength > 8)); then
                      # Add the proper number of spaces to align the descriptions
                      for ((i = ${#comp} ; i < longest ; i++)); do
                          comp+=" "
                      done
                  else
                      # Don't pad the descriptions so we can fit more text after the completion
                      maxdesclength=$(( COLUMNS - ${#comp} - 4 ))
                  fi

                  # If there is enough space for any description text,
                  # truncate the descriptions that are too long for the shell width
                  if ((maxdesclength > 0)); then
                      if ((${#desc} > maxdesclength)); then
                          desc=${desc:0:$(( maxdesclength - 1 ))}
                          desc+="…"
                      fi
                      comp+="  ($desc)"
                  fi
                  COMPREPLY[ci]=$comp
                  __kubectl_debug "Final comp: $comp"
              fi
          done
      }

      __start_kubectl()
      {
          local cur prev words cword split

          COMPREPLY=()

          # Call _init_completion from the bash-completion package
          # to prepare the arguments properly
          if declare -F _init_completion >/dev/null 2>&1; then
              _init_completion -n =: || return
          else
              __kubectl_init_completion -n =: || return
          fi

          __kubectl_debug
          __kubectl_debug "========= starting completion logic =========="
          __kubectl_debug "cur is ${cur}, words[*] is ${words[*]}, #words[@] is ${#words[@]}, cword is $cword"

          # The user could have moved the cursor backwards on the command-line.
          # We need to trigger completion from the $cword location, so we need
          # to truncate the command-line ($words) up to the $cword location.
          words=("${words[@]:0:$cword+1}")
          __kubectl_debug "Truncated words[*]: ${words[*]},"

          local out directive
          __kubectl_get_completion_results
          __kubectl_process_completion_results
      }

      if [[ $(type -t compopt) = "builtin" ]]; then
          complete -o default -F __start_kubectl kubectl
      else
          complete -o default -o nospace -F __start_kubectl kubectl
      fi

      # ex: ts=4 sw=4 et filetype=sh
  - name: helm.sh
    description: helm命令自动补全脚本
    content: |
      # bash completion V2 for helm                                 -*- shell-script -*-

      __helm_debug()
      {
          if [[ -n ${BASH_COMP_DEBUG_FILE-} ]]; then
              echo "$*" >> "${BASH_COMP_DEBUG_FILE}"
          fi
      }

      # Macs have bash3 for which the bash-completion package doesn't include
      # _init_completion. This is a minimal version of that function.
      __helm_init_completion()
      {
          COMPREPLY=()
          _get_comp_words_by_ref "$@" cur prev words cword
      }

      # This function calls the helm program to obtain the completion
      # results and the directive.  It fills the 'out' and 'directive' vars.
      __helm_get_completion_results() {
          local requestComp lastParam lastChar args

          # Prepare the command to request completions for the program.
          # Calling ${words[0]} instead of directly helm allows handling aliases
          args=("${words[@]:1}")
          requestComp="${words[0]} __complete ${args[*]}"

          lastParam=${words[$((${#words[@]}-1))]}
          lastChar=${lastParam:$((${#lastParam}-1)):1}
          __helm_debug "lastParam ${lastParam}, lastChar ${lastChar}"

          if [[ -z ${cur} && ${lastChar} != = ]]; then
              # If the last parameter is complete (there is a space following it)
              # We add an extra empty parameter so we can indicate this to the go method.
              __helm_debug "Adding extra empty parameter"
              requestComp="${requestComp} ''"
          fi

          # When completing a flag with an = (e.g., helm -n=<TAB>)
          # bash focuses on the part after the =, so we need to remove
          # the flag part from $cur
          if [[ ${cur} == -*=* ]]; then
              cur="${cur#*=}"
          fi

          __helm_debug "Calling ${requestComp}"
          # Use eval to handle any environment variables and such
          out=$(eval "${requestComp}" 2>/dev/null)

          # Extract the directive integer at the very end of the output following a colon (:)
          directive=${out##*:}
          # Remove the directive
          out=${out%:*}
          if [[ ${directive} == "${out}" ]]; then
              # There is not directive specified
              directive=0
          fi
          __helm_debug "The completion directive is: ${directive}"
          __helm_debug "The completions are: ${out}"
      }

      __helm_process_completion_results() {
          local shellCompDirectiveError=1
          local shellCompDirectiveNoSpace=2
          local shellCompDirectiveNoFileComp=4
          local shellCompDirectiveFilterFileExt=8
          local shellCompDirectiveFilterDirs=16
          local shellCompDirectiveKeepOrder=32

          if (((directive & shellCompDirectiveError) != 0)); then
              # Error code.  No completion.
              __helm_debug "Received error from custom completion go code"
              return
          else
              if (((directive & shellCompDirectiveNoSpace) != 0)); then
                  if [[ $(type -t compopt) == builtin ]]; then
                      __helm_debug "Activating no space"
                      compopt -o nospace
                  else
                      __helm_debug "No space directive not supported in this version of bash"
                  fi
              fi
              if (((directive & shellCompDirectiveKeepOrder) != 0)); then
                  if [[ $(type -t compopt) == builtin ]]; then
                      # no sort isn't supported for bash less than < 4.4
                      if [[ ${BASH_VERSINFO[0]} -lt 4 || ( ${BASH_VERSINFO[0]} -eq 4 && ${BASH_VERSINFO[1]} -lt 4 ) ]]; then
                          __helm_debug "No sort directive not supported in this version of bash"
                      else
                          __helm_debug "Activating keep order"
                          compopt -o nosort
                      fi
                  else
                      __helm_debug "No sort directive not supported in this version of bash"
                  fi
              fi
              if (((directive & shellCompDirectiveNoFileComp) != 0)); then
                  if [[ $(type -t compopt) == builtin ]]; then
                      __helm_debug "Activating no file completion"
                      compopt +o default
                  else
                      __helm_debug "No file completion directive not supported in this version of bash"
                  fi
              fi
          fi

          # Separate activeHelp from normal completions
          local completions=()
          local activeHelp=()
          __helm_extract_activeHelp

          if (((directive & shellCompDirectiveFilterFileExt) != 0)); then
              # File extension filtering
              local fullFilter filter filteringCmd

              # Do not use quotes around the $completions variable or else newline
              # characters will be kept.
              for filter in ${completions[*]}; do
                  fullFilter+="$filter|"
              done

              filteringCmd="_filedir $fullFilter"
              __helm_debug "File filtering command: $filteringCmd"
              $filteringCmd
          elif (((directive & shellCompDirectiveFilterDirs) != 0)); then
              # File completion for directories only

              local subdir
              subdir=${completions[0]}
              if [[ -n $subdir ]]; then
                  __helm_debug "Listing directories in $subdir"
                  pushd "$subdir" >/dev/null 2>&1 && _filedir -d && popd >/dev/null 2>&1 || return
              else
                  __helm_debug "Listing directories in ."
                  _filedir -d
              fi
          else
              __helm_handle_completion_types
          fi

          __helm_handle_special_char "$cur" :
          __helm_handle_special_char "$cur" =

          # Print the activeHelp statements before we finish
          if ((${#activeHelp[*]} != 0)); then
              printf "\n";
              printf "%s\n" "${activeHelp[@]}"
              printf "\n"

              # The prompt format is only available from bash 4.4.
              # We test if it is available before using it.
              if (x=${PS1@P}) 2> /dev/null; then
                  printf "%s" "${PS1@P}${COMP_LINE[@]}"
              else
                  # Can't print the prompt.  Just print the
                  # text the user had typed, it is workable enough.
                  printf "%s" "${COMP_LINE[@]}"
              fi
          fi
      }

      # Separate activeHelp lines from real completions.
      # Fills the $activeHelp and $completions arrays.
      __helm_extract_activeHelp() {
          local activeHelpMarker="_activeHelp_ "
          local endIndex=${#activeHelpMarker}

          while IFS='' read -r comp; do
              if [[ ${comp:0:endIndex} == $activeHelpMarker ]]; then
                  comp=${comp:endIndex}
                  __helm_debug "ActiveHelp found: $comp"
                  if [[ -n $comp ]]; then
                      activeHelp+=("$comp")
                  fi
              else
                  # Not an activeHelp line but a normal completion
                  completions+=("$comp")
              fi
          done <<<"${out}"
      }

      __helm_handle_completion_types() {
          __helm_debug "__helm_handle_completion_types: COMP_TYPE is $COMP_TYPE"

          case $COMP_TYPE in
          37|42)
              # Type: menu-complete/menu-complete-backward and insert-completions
              # If the user requested inserting one completion at a time, or all
              # completions at once on the command-line we must remove the descriptions.
              # https://github.com/spf13/cobra/issues/1508
              local tab=$'\t' comp
              while IFS='' read -r comp; do
                  [[ -z $comp ]] && continue
                  # Strip any description
                  comp=${comp%%$tab*}
                  # Only consider the completions that match
                  if [[ $comp == "$cur"* ]]; then
                      COMPREPLY+=("$comp")
                  fi
              done < <(printf "%s\n" "${completions[@]}")
              ;;

          *)
              # Type: complete (normal completion)
              __helm_handle_standard_completion_case
              ;;
          esac
      }

      __helm_handle_standard_completion_case() {
          local tab=$'\t' comp

          # Short circuit to optimize if we don't have descriptions
          if [[ "${completions[*]}" != *$tab* ]]; then
              IFS=$'\n' read -ra COMPREPLY -d '' < <(compgen -W "${completions[*]}" -- "$cur")
              return 0
          fi

          local longest=0
          local compline
          # Look for the longest completion so that we can format things nicely
          while IFS='' read -r compline; do
              [[ -z $compline ]] && continue
              # Strip any description before checking the length
              comp=${compline%%$tab*}
              # Only consider the completions that match
              [[ $comp == "$cur"* ]] || continue
              COMPREPLY+=("$compline")
              if ((${#comp}>longest)); then
                  longest=${#comp}
              fi
          done < <(printf "%s\n" "${completions[@]}")

          # If there is a single completion left, remove the description text
          if ((${#COMPREPLY[*]} == 1)); then
              __helm_debug "COMPREPLY[0]: ${COMPREPLY[0]}"
              comp="${COMPREPLY[0]%%$tab*}"
              __helm_debug "Removed description from single completion, which is now: ${comp}"
              COMPREPLY[0]=$comp
          else # Format the descriptions
              __helm_format_comp_descriptions $longest
          fi
      }

      __helm_handle_special_char()
      {
          local comp="$1"
          local char=$2
          if [[ "$comp" == *${char}* && "$COMP_WORDBREAKS" == *${char}* ]]; then
              local word=${comp%"${comp##*${char}}"}
              local idx=${#COMPREPLY[*]}
              while ((--idx >= 0)); do
                  COMPREPLY[idx]=${COMPREPLY[idx]#"$word"}
              done
          fi
      }

      __helm_format_comp_descriptions()
      {
          local tab=$'\t'
          local comp desc maxdesclength
          local longest=$1

          local i ci
          for ci in ${!COMPREPLY[*]}; do
              comp=${COMPREPLY[ci]}
              # Properly format the description string which follows a tab character if there is one
              if [[ "$comp" == *$tab* ]]; then
                  __helm_debug "Original comp: $comp"
                  desc=${comp#*$tab}
                  comp=${comp%%$tab*}

                  # $COLUMNS stores the current shell width.
                  # Remove an extra 4 because we add 2 spaces and 2 parentheses.
                  maxdesclength=$(( COLUMNS - longest - 4 ))

                  # Make sure we can fit a description of at least 8 characters
                  # if we are to align the descriptions.
                  if ((maxdesclength > 8)); then
                      # Add the proper number of spaces to align the descriptions
                      for ((i = ${#comp} ; i < longest ; i++)); do
                          comp+=" "
                      done
                  else
                      # Don't pad the descriptions so we can fit more text after the completion
                      maxdesclength=$(( COLUMNS - ${#comp} - 4 ))
                  fi

                  # If there is enough space for any description text,
                  # truncate the descriptions that are too long for the shell width
                  if ((maxdesclength > 0)); then
                      if ((${#desc} > maxdesclength)); then
                          desc=${desc:0:$(( maxdesclength - 1 ))}
                          desc+="…"
                      fi
                      comp+="  ($desc)"
                  fi
                  COMPREPLY[ci]=$comp
                  __helm_debug "Final comp: $comp"
              fi
          done
      }

      __start_helm()
      {
          local cur prev words cword split

          COMPREPLY=()

          # Call _init_completion from the bash-completion package
          # to prepare the arguments properly
          if declare -F _init_completion >/dev/null 2>&1; then
              _init_completion -n =: || return
          else
              __helm_init_completion -n =: || return
          fi

          __helm_debug
          __helm_debug "========= starting completion logic =========="
          __helm_debug "cur is ${cur}, words[*] is ${words[*]}, #words[@] is ${#words[@]}, cword is $cword"

          # The user could have moved the cursor backwards on the command-line.
          # We need to trigger completion from the $cword location, so we need
          # to truncate the command-line ($words) up to the $cword location.
          words=("${words[@]:0:$cword+1}")
          __helm_debug "Truncated words[*]: ${words[*]},"

          local out directive
          __helm_get_completion_results
          __helm_process_completion_results
      }

      if [[ $(type -t compopt) = "builtin" ]]; then
          complete -o default -F __start_helm helm
      else
          complete -o default -o nospace -F __start_helm helm
      fi

      # ex: ts=4 sw=4 et filetype=sh
machineGroups:
  - name: fastdp-orbit-server
    description: 必须选择fastdp-orbit-server所在机器（单选）
  - name: k8s_etcd
    description: 独立ETCD集群节点分组，仅用于部署高可用etcd数据库，建议为奇数个
  - name: k8s_master
    description: K8s所有控制平面Master节点分组，建议为奇数个
  - name: k8s_cluster
    description: k8s集群全部节点统一分组，包含所有Master、ETCD、Worker节点
  - name: k8s_master0
    description: K8s首台控制平面主节点，集群初始化入口节点
stages:
  - name: 安装 Docker
    description: 离线部署Docker容器引擎与cri-dockerd适配层
    machineGroup: k8s_cluster
    tasks:
      - ref: 1
        name: '[Docker部署] 拉取docker及cri-dockerd软件包'
        module: file_pull
        order: 1
        params: '{"url":"{{ .Server.protocol }}://{{ .Server.ip }}:{{ .Server.port }}/download/{{.item.name}}","md5":"{{.item.md5}}","dest":"{{ .GlobalVariable.base_pkg_dir }}/"}'
        loop: '[{"name":"docker-24.0.9.tgz","md5":"16639a1b0424d6ccb7301e56cdeee707"},{"name":"cri-dockerd-0.4.0.amd64.tgz","md5":"bb1b822b19c316f9fb4c72afa9f53e86"}]'
      - ref: 2
        name: '[Docker部署] 解压docker软件包到/usr/local/bin'
        module: unarchive
        order: 2
        params: '{"src":"{{ .GlobalVariable.base_pkg_dir }}/{{.item}}","dest":"/usr/local/bin","strip_components":"1"}'
        loop: '["docker-24.0.9.tgz","cri-dockerd-0.4.0.amd64.tgz"]'
      - ref: 3
        name: '[Docker服务] 拉取docker及cri-docker的systemd服务文件'
        module: template
        order: 3
        params: '{"src":"{{.item}}","content":"","dest":"/usr/lib/systemd/system/{{.item}}","append":""}'
        loop: '["cri-docker.service","docker.service"]'
      - ref: 4
        name: '[Docker配置] 生成docker daemon.json配置文件'
        module: template
        order: 4
        params: '{"src":"daemon.json","dest":"/etc/docker/daemon.json"}'
        hooks:
          - systemctl daemon-reload
      - ref: 5
        name: '[Docker服务] 启动docker和cri-docker服务'
        module: systemd
        order: 5
        params: '{"name":"{{.item}}","action":"start"}'
        loop: '["docker","cri-docker"]'
      - ref: 6
        name: '[Docker服务] 设置docker和cri-docker开机自启'
        module: systemd
        order: 6
        params: '{"name":"{{.item}}","action":"enable"}'
        loop: '["docker","cri-docker"]'
      - ref: 7
        name: 测试服务状态
        module: systemd
        order: 7
        params: '{"name":"{{.item}}","action":"status"}'
        loop: '["docker","cri-docker"]'
  - name: 镜像准备与私有仓库
    machineGroup: k8s_master0
    tasks:
      - ref: 1
        name: '[镜像准备] 拉取基础镜像压缩包'
        module: file_pull
        order: 1
        params: '{"url":"{{ .Server.protocol }}://{{ .Server.ip }}:{{ .Server.port }}/download/base-images.tar.gz","md5":"7cb5394db857fd688725cb2b71a72d15","dest":"{{ .GlobalVariable.image_dir }}/","type":"dir"}'
      - ref: 2
        name: '[镜像准备] 解压基础镜像压缩包'
        module: unarchive
        order: 2
        params: '{"src":"{{ .GlobalVariable.image_dir }}/base-images.tar.gz","dest":"{{ .GlobalVariable.image_dir }}"}'
      - ref: 3
        name: '[镜像准备] 循环加载基础镜像'
        module: image
        order: 3
        params: '{"path":"{{ .GlobalVariable.image_dir }}/{{.item.path}}","tag":"{{.item.tag}}","action":"load"}'
        loop: '[{"path":"calico-cni.tar","tag":"registry.pf.com:5000/calico/cni:v3.29.1"},{"path":"calico-kube-controllers.tar","tag":"registry.pf.com:5000/calico/kube-controllers:v3.29.1"},{"path":"calico-node.tar","tag":"registry.pf.com:5000/calico/node:v3.29.1"},{"path":"registry.tar","tag":"registry.pf.com:5000/registry:latest"},{"path":"coredns.tar","tag":"registry.pf.com:5000/coredns/coredns:1.8.0"},{"path":"pause-3.6.tar","tag":"registry.pf.com:5000/pause:3.6"}]'
      - ref: 4
        name: '[私有仓库] 启动registry容器'
        module: script
        order: 4
        params: '{"script":"# 检查运行中的registry容器\nif [ -z \"$(docker ps -q --filter ''name=^/registry$'' --filter ''status=running'')\" ]; then\n  # 不存在则启动容器\n  docker run -d -p 5000:5000 --name registry \\\n    --restart=always \\\n    -v {{ .GlobalVariable.docker_registry_data }}:/var/lib/registry \\\n    registry.pf.com:5000/registry\n  echo \"等待容器启动（3秒后检查）...\"\n  sleep 3\n  if [ -n \"$(docker ps -q --filter ''name=^/registry$'' --filter ''status=running'')\" ]; then\n    echo \"registry容器启动成功\"\n    exit 0\n  else\n    echo \"错误：registry容器启动失败（3秒内未进入运行状态）\"\n    echo \"容器日志：\"\n    docker logs registry 2>&1\n    exit 1\n  fi\nelse\n  echo \"registry容器已运行\"\n  exit 0\nfi\n"}'
      - ref: 5
        name: '[镜像准备] 循环push基础镜像'
        module: image
        order: 5
        params: '{"tag":"{{.item}}","action":"push"}'
        loop: '["registry.pf.com:5000/calico/cni:v3.29.1","registry.pf.com:5000/calico/kube-controllers:v3.29.1","registry.pf.com:5000/calico/node:v3.29.1","registry.pf.com:5000/registry:latest","registry.pf.com:5000/coredns/coredns:1.8.0","registry.pf.com:5000/pause:3.6"]'
      - ref: 6
        name: 测试镜像仓库
        module: shell
        order: 6
        params: '{"command":"docker ps|grep registry"}'
        retries: 1
        delay: 1
  - name: K8s集群CA与组件证书一键生成
    description: 离线分发cfssl证书工具与证书模板，依次生成集群根CA、etcd独立CA、apiserver/控制器/调度器/代理/管理员等全组件TLS证书，产出serviceaccount密钥与各组件kubeconfig授权配置文件
    machineGroup: fastdp-orbit-server
    tasks:
      - ref: 1
        name: '[证书准备] 拉取cfssl工具及CSR模板压缩包'
        module: file_pull
        order: 1
        params: '{"url":"{{ .Server.protocol }}://{{ .Server.ip }}:{{ .Server.port }}/download/{{.item.name}}","md5":"{{.item.md5}}","dest":"{{ .GlobalVariable.base_pkg_dir }}/","type":"dir"}'
        loop: '[{"name":"cfssl.tar.gz","md5":"8a0f9974abf770548981277486f24365"},{"name":"csr.tar.gz","md5":"ebb8695cdca3b05ac2504ef458c51654"}]'
      - ref: 2
        name: '[证书准备] 解压cfssl工具及CSR模板'
        module: unarchive
        order: 2
        params: '{"src":"{{ .GlobalVariable.base_pkg_dir }}/{{.item.src}}","dest":"{{.item.dest}}"}'
        loop: '[{"src":"cfssl.tar.gz","dest":"/usr/local/bin"},{"src":"csr.tar.gz","dest":"/etc/kubernetes/pki"}]'
      - ref: 3
        name: '[证书准备] 生成根CA证书（ca）'
        module: cfssl
        order: 3
        params: '{"action":"generate_ca","csr_path":"/etc/kubernetes/pki/ca-csr.json","output_dir":"/etc/kubernetes/pki/","basename":"ca"}'
      - ref: 4
        name: '[证书准备] 生成etcd及apiserver的CSR配置文件'
        module: template
        order: 4
        params: '{"src":"{{.item.src}}","dest":"{{.item.dest}}"}'
        loop: '[{"src":"etcd-pf-csr.json","dest":"/etc/kubernetes/pki/etcd/etcd-pf-csr.json"},{"src":"apiserver-csr.json","dest":"/etc/kubernetes/pki/apiserver-csr.json"}]'
      - ref: 5
        name: '[证书准备] 生成etcd根CA证书'
        module: cfssl
        order: 5
        params: '{"action":"generate_ca","csr_path":"/etc/kubernetes/pki/etcd-ca-csr.json","output_dir":"/etc/kubernetes/pki/etcd/","basename":"ca"}'
      - ref: 6
        name: '[证书准备] 生成etcd服务证书'
        module: cfssl
        order: 6
        params: '{"action":"generate_cert","csr_path":"/etc/kubernetes/pki/etcd/etcd-pf-csr.json","output_dir":"/etc/kubernetes/pki/etcd/","basename":"etcd","ca_cert":"/etc/kubernetes/pki/etcd/ca.pem","ca_key":"/etc/kubernetes/pki/etcd/ca-key.pem","config_file":"/etc/kubernetes/pki/ca-config.json","profile":"etcd"}'
      - ref: 7
        name: '[证书准备] 生成kube-apiserver服务证书'
        module: cfssl
        order: 7
        params: '{"action":"generate_cert","csr_path":"/etc/kubernetes/pki/apiserver-csr.json","output_dir":"/etc/kubernetes/pki","basename":"apiserver","ca_cert":"/etc/kubernetes/pki/ca.pem","ca_key":"/etc/kubernetes/pki/ca-key.pem","config_file":"/etc/kubernetes/pki/ca-config.json","profile":"kubernetes"}'
      - ref: 8
        name: '[证书准备] 生成front-proxy根CA证书'
        module: cfssl
        order: 8
        params: '{"action":"generate_ca","csr_path":"/etc/kubernetes/pki/front-proxy-ca-csr.json","output_dir":"/etc/kubernetes/pki","basename":"front-proxy-ca"}'
      - ref: 9
        name: '[证书准备] 生成front-proxy-client证书'
        module: cfssl
        order: 9
        params: '{"action":"generate_cert","csr_path":"/etc/kubernetes/pki/front-proxy-client-csr.json","output_dir":"/etc/kubernetes/pki","basename":"front-proxy-client","ca_cert":"/etc/kubernetes/pki/front-proxy-ca.pem","ca_key":"/etc/kubernetes/pki/front-proxy-ca-key.pem","config_file":"/etc/kubernetes/pki/ca-config.json","profile":"kubernetes"}'
      - ref: 10
        name: '[证书准备] 生成kube-controller-manager证书'
        module: cfssl
        order: 10
        params: '{"action":"generate_cert","csr_path":"/etc/kubernetes/pki/controller-manager-csr.json","output_dir":"/etc/kubernetes/pki","basename":"controller-manager","ca_cert":"/etc/kubernetes/pki/ca.pem","ca_key":"/etc/kubernetes/pki/ca-key.pem","config_file":"/etc/kubernetes/pki/ca-config.json","profile":"kubernetes"}'
      - ref: 11
        name: '[证书准备] 生成kube-scheduler证书'
        module: cfssl
        order: 11
        params: '{"action":"generate_cert","csr_path":"/etc/kubernetes/pki/scheduler-csr.json","output_dir":"/etc/kubernetes/pki","basename":"scheduler","ca_cert":"/etc/kubernetes/pki/ca.pem","ca_key":"/etc/kubernetes/pki/ca-key.pem","config_file":"/etc/kubernetes/pki/ca-config.json","profile":"kubernetes"}'
      - ref: 12
        name: '[证书准备] 生成admin用户证书'
        module: cfssl
        order: 12
        params: '{"action":"generate_cert","csr_path":"/etc/kubernetes/pki/admin-csr.json","output_dir":"/etc/kubernetes/pki","basename":"admin","ca_cert":"/etc/kubernetes/pki/ca.pem","ca_key":"/etc/kubernetes/pki/ca-key.pem","config_file":"/etc/kubernetes/pki/ca-config.json","profile":"kubernetes"}'
      - ref: 13
        name: '[证书准备] 生成kube-proxy证书'
        module: cfssl
        order: 13
        params: '{"action":"generate_cert","csr_path":"/etc/kubernetes/pki/kube-proxy-csr.json","output_dir":"/etc/kubernetes/pki","basename":"kube-proxy","ca_cert":"/etc/kubernetes/pki/ca.pem","ca_key":"/etc/kubernetes/pki/ca-key.pem","config_file":"/etc/kubernetes/pki/ca-config.json","profile":"kubernetes"}'
      - ref: 14
        name: '[证书准备] 生成Service Account密钥对'
        module: script
        order: 14
        params: '{"script":"SA_KEY_PATH=\"/etc/kubernetes/pki/sa.key\"\nSA_PUB_PATH=\"/etc/kubernetes/pki/sa.pub\"\nPKI_DIR=$(dirname \"${SA_KEY_PATH}\")\n\n# 检查并创建PKI目录（如果不存在）\nif [ ! -d \"${PKI_DIR}\" ]; then\n  echo \"创建PKI目录: ${PKI_DIR}\"\n  mkdir -p \"${PKI_DIR}\"\n  chmod 0755 \"${PKI_DIR}\"\nfi\n\n# 检查密钥对是否已存在\nif [ -f \"${SA_KEY_PATH}\" ] && [ -f \"${SA_PUB_PATH}\" ]; then\n  echo \"Service Account密钥对已存在（${SA_KEY_PATH} 和 ${SA_PUB_PATH}），跳过生成\"\n  exit 0\nfi\n\n# 如果不存在则生成密钥对\necho \"生成Service Account RSA私钥: ${SA_KEY_PATH}\"\nopenssl genrsa -out \"${SA_KEY_PATH}\" 2048\nchmod 0600 \"${SA_KEY_PATH}\"\n\necho \"从私钥提取公钥: ${SA_PUB_PATH}\"\nopenssl rsa -in \"${SA_KEY_PATH}\" -pubout -out \"${SA_PUB_PATH}\"\nchmod 0644 \"${SA_PUB_PATH}\"\n\necho \"Service Account密钥对生成完成\"\n"}'
      - ref: 15
        name: '[证书准备] 生成各组件kubeconfig配置文件'
        module: template
        order: 15
        params: '{"src":"{{ .item.src }}","dest":"/etc/kubernetes/{{ .item.dest }}"}'
        loop: '[{"src":"controller-manager.conf","dest":"controller-manager.conf"},{"src":"scheduler.conf","dest":"scheduler.conf"},{"src":"admin.conf","dest":"admin.conf"},{"src":"bootstrap-kubelet.conf","dest":"bootstrap-kubelet.conf"},{"src":"bootstrap.secret.yaml","dest":"bootstrap.secret.yaml"},{"src":"kube-proxy.conf","dest":"kube-proxy.conf"}]'
  - name: ETCD部署
    description: 针对独立ETCD节点组执行集群部署，同步ETCD专属TLS证书，离线分发etcd二进制程序，渲染集群配置与systemd服务、启动常驻etcd集群并配置开机自启，注入etcdctl全局环境变量，完成高可用etcd数据库集群初始化
    machineGroup: k8s_etcd
    tasks:
      - ref: 1
        name: 复制etcd证书目录到目标路径
        module: copy
        order: 1
        params: '{"src":"/etc/kubernetes/pki/etcd","dest":"/etc/kubernetes/pki/etcd","type":"dir"}'
      - ref: 2
        name: '[etcd准备] 拉取etcd压缩包'
        module: file_pull
        order: 2
        params: '{"url":"{{ .Server.protocol }}://{{ .Server.ip }}:{{ .Server.port }}/download/etcd.tar.gz","md5":"2a77c5db91051eae5e6ad733723dbbd8","dest":"{{ .GlobalVariable.base_pkg_dir }}/","type":"dir"}'
      - ref: 3
        name: '[etcd准备] 解压etcd压缩包'
        module: unarchive
        order: 3
        params: '{"src":"{{ .GlobalVariable.base_pkg_dir }}/etcd.tar.gz","dest":"/usr/local/bin"}'
      - ref: 4
        name: '[etcd服务配置] 生成etcd.service服务文件'
        module: template
        order: 4
        params: '{"src":"etcd.service","content":"","dest":"/etc/systemd/system/etcd.service","append":""}'
        hooks:
          - systemctl daemon-reload
      - ref: 5
        name: '[etcd配置] 生成etcd.yaml配置文件'
        module: template
        order: 5
        params: '{"src":"etcd.yaml","dest":"/etc/etcd/etcd.yaml"}'
        hooks:
          - restart_etcd
      - ref: 6
        name: 启动etcd服务
        module: systemd
        order: 6
        params: '{"name":"etcd","action":"start"}'
      - ref: 7
        name: 设置etcd服务开机自启
        module: systemd
        order: 7
        params: '{"name":"etcd","action":"enable"}'
      - ref: 8
        name: '[etcd环境配置] 生成etcdctl环境变量脚本'
        module: template
        order: 8
        params: '{"src":"etcd.sh","dest":"/etc/profile.d/etcdctl.sh"}'
      - ref: 9
        name: 测试etcd服务状态
        module: systemd
        order: 9
        params: '{"name":"etcd","action":"status"}'
  - name: 系统基础初始化
    description: 关闭系统防火墙、禁用SELinux、永久关闭Swap分区
    machineGroup: k8s_cluster
    tasks:
      - ref: 1
        name: 关闭firewalld开机自启动（非Ubuntu系统）
        module: systemd
        order: 1
        params: '{"name":"firewalld","action":"disable"}'
        when: '{{ .Machine.os_name }} !contains ubuntu'
      - ref: 2
        name: 停止firewalld服务（非Ubuntu系统）
        module: systemd
        order: 2
        params: '{"name":"firewalld","action":"stop"}'
        when: '{{ .Machine.os_name }} !contains ubuntu'
      - ref: 3
        name: 关闭ufw开机自启动（Ubuntu系统）
        module: systemd
        order: 3
        params: '{"name":"ufw","action":"disable"}'
        when: '{{ .Machine.os_name }} contains ubuntu'
      - ref: 4
        name: 停止ufw服务（Ubuntu系统）
        module: systemd
        order: 4
        params: '{"name":"ufw","action":"stop"}'
        when: '{{ .Machine.os_name }} contains ubuntu'
      - ref: 5
        name: 禁用SELinux开机自启动（永久生效）
        module: selinux
        order: 5
        params: '{"action":"disabled"}'
      - ref: 6
        name: 临时设置SELinux为Permissive模式
        module: selinux
        order: 6
        params: '{"action":"set_permissive"}'
      - ref: 7
        name: 临时关闭Swap分区
        module: shell
        order: 7
        params: '{"command":"swapoff -a"}'
        when: '{{ .Machine.swap_kb }} != 0'
      - ref: 8
        name: 注释/etc/fstab中Swap配置（永久禁用）
        module: lineinfile
        order: 8
        params: '{"path":"/etc/fstab","regexp":"^(.*swap.*)$","line":"#$1","action":"replace","backrefs":"true"}'
  - name: 集群网络互通配置
    description: 配置集群节点hosts主机名解析、适配Calico网络的NetworkManager规则、修复Ubuntu系统DNS配置，保障集群内部网络互通与CNI插件兼容性
    machineGroup: k8s_cluster
    tasks:
      - ref: 1
        name: 写入集群节点hosts主机名解析
        module: blockinfile
        order: 1
        params: '{"path":"/etc/hosts","content":"{{ range $index, $value := .Groups.k8s_cluster }}\n{{ $value.ip }} {{ $value.hostname }}\n{{- end }}\n{{ (index .Groups.k8s_master0 0).ip }} registry.pf.com","action":"ensure"}'
      - ref: 2
        name: 配置NetworkManager忽略Calico网络接口（非Ubuntu系统）
        module: blockinfile
        order: 2
        params: '{"action":"ensure","path":"/etc/NetworkManager/conf.d/calico.conf","content":"[keyfile]\nunmanaged-devices=interface-name:cali*;interface-name:tunl*\n"}'
        when: '{{ .Machine.os_name }} !contains ubuntu'
        hooks:
          - restart_NetworkManager
      - ref: 3
        name: 删除Ubuntu默认resolv.conf软链接
        module: file
        order: 3
        params: '{"path":"/etc/resolv.conf","action":"delete"}'
        when: '{{ .Machine.os_name }} contains ubuntu'
      - ref: 4
        name: 重建Ubuntu真实DNS配置软链接
        module: file
        order: 4
        params: '{"src":"/run/systemd/resolve/resolv.conf","path":"/etc/resolv.conf","action":"symlink","type":"file"}'
        when: '{{ .Machine.os_name }} contains ubuntu'
  - name: 本地离线软件仓库及nginx部署
    description: 部署Nginx静态文件服务、解压离线软件仓库包，搭建麒麟与Ubuntu双系统本地离线软件源，为后续全链路离线安装提供软件包分发支撑
    machineGroup: k8s_cluster
    tasks:
      - ref: 1
        name: 拉取Nginx基础软件包（Kylin系统）
        module: file_pull
        order: 1
        params: '{"url":"{{ .Server.protocol }}://{{ .Server.ip }}:{{ .Server.port }}/download/{{ .GlobalVariable.nginx_rpm_pkg }}","md5":"c2b8627bb1efaee4536474d7c0513efd","dest":"{{ .GlobalVariable.base_pkg_dir }}/"}'
        when: '{{ .Machine.os_name }} !contains ubuntu'
      - ref: 2
        name: 拉取Nginx基础软件包（Ubuntu系统）
        module: file_pull
        order: 2
        params: '{"url":"{{ .Server.protocol }}://{{ .Server.ip }}:{{ .Server.port }}/download/{{ .GlobalVariable.ubuntu_nginx_pkg }}","md5":"3267b43c8ac7c2483ace26e1831c2143","dest":"{{ .GlobalVariable.base_pkg_dir }}/"}'
        when: '{{ .Machine.os_name }} contains ubuntu'
      - ref: 3
        name: 拉取离线软件仓库包
        module: file_pull
        order: 3
        params: '{"url":"{{ .Server.protocol }}://{{ .Server.ip }}:{{ .Server.port }}/download/{{ .GlobalVariable.repo_pkg }}","md5":"ed340b85facff3cd390a1054ba33060b","dest":"{{ .GlobalVariable.repository_dir }}/"}'
      - ref: 4
        name: 解压Nginx软件包（Ubuntu系统）
        module: unarchive
        order: 4
        params: '{"src":"{{ .GlobalVariable.base_pkg_dir }}/{{ .GlobalVariable.ubuntu_nginx_pkg }}","dest":"/usr/local"}'
        when: '{{ .Machine.os_name }} contains ubuntu'
      - ref: 5
        name: 安装Nginx服务（Kylin系统）
        module: package
        order: 5
        params: '{"action":"localinstall","name":"{{ .GlobalVariable.base_pkg_dir }}/{{ .GlobalVariable.nginx_rpm_pkg }}"}'
        when: '{{ .Machine.os_name }} contains kylin'
      - ref: 6
        name: 解压离线软件仓库包
        module: unarchive
        order: 6
        params: '{"src":"{{ .GlobalVariable.repository_dir }}/{{ .GlobalVariable.repo_pkg }}","dest":"{{ .GlobalVariable.repository_dir }}"}'
      - ref: 7
        name: 部署kube-nginx.conf配置文件
        module: template
        order: 7
        params: '{"src":"repo-nginx.conf","dest":"/usr/local/nginx/conf/kube-nginx.conf"}'
        hooks:
          - restart_kube-nginx
      - ref: 8
        name: 部署k8s-apiserver-lb配置文件
        module: template
        order: 8
        params: '{"src":"k8s-apiserver-lb.conf","content":"","dest":"/usr/local/nginx/conf/kube-nginx.conf","append":"true"}'
        hooks:
          - restart_kube-nginx
      - ref: 9
        name: 部署kube-nginx systemd服务文件
        module: template
        order: 9
        params: '{"src":"kube-nginx.service","content":"","dest":"/etc/systemd/system/kube-nginx.service","append":""}'
        hooks:
          - systemctl daemon-reload
      - ref: 10
        name: 启动kube-nginx服务
        module: systemd
        order: 10
        params: '{"action":"start","name":"kube-nginx"}'
      - ref: 11
        name: 启用kube-nginx开机自启
        module: systemd
        order: 11
        params: '{"action":"enable","name":"kube-nginx"}'
      - ref: 12
        name: 测试kube-nginx状态
        module: systemd
        order: 12
        params: '{"name":"kube-nginx","action":"status"}'
  - name: 安装系统基础工具套件（私有化环境无软件源可用时）
    description: 适用于私有化环境无软件源可用场景，备份系统原有源、添加本地离线软件源、更新缓存并安装集群运维基础工具套件，安装完成后自动恢复源配置，适配麒麟与Ubuntu双系统
    machineGroup: k8s_cluster
    tasks:
      - ref: 1
        name: 测试本地YUM仓库可用性（Kylin系统）
        module: repo
        order: 1
        params: '{"action":"test","url":"http://{{ (index .Groups.k8s_master0 0).ip }}:{{ .GlobalVariable.repository_port }}/rpms/KylinV10SP3-2403/"}'
        when: '{{ .Machine.os_name }} contains kylin'
      - ref: 2
        name: 测试本地APT仓库可用性（Ubuntu系统）
        module: repo
        order: 2
        params: '{"action":"test","url":"http://{{ (index .Groups.k8s_master0 0).ip }}:{{ .GlobalVariable.repository_port }}/debs/Ubuntu2204/"}'
        when: '{{ .Machine.os_name }} contains ubuntu'
      - ref: 3
        name: 备份系统原有软件源配置
        module: repo
        order: 3
        params: '{"action":"backup"}'
      - ref: 4
        name: 添加K8s本地APT源（Ubuntu系统）
        module: repo
        order: 4
        params: '{"name":"k8s_repo","action":"add","url":"http://{{ (index .Groups.k8s_master0 0).ip }}:{{ .GlobalVariable.repository_port }}/debs/Ubuntu2204"}'
        when: '{{ .Machine.os_name }} contains ubuntu'
      - ref: 5
        name: 添加K8s本地YUM源（Kylin系统）
        module: repo
        order: 5
        params: '{"name":"k8s_repo","action":"add","url":"http://{{ (index .Groups.k8s_master0 0).ip }}:{{ .GlobalVariable.repository_port }}/rpms/KylinV10SP3-2403"}'
        when: '{{ .Machine.os_name }} contains kylin'
      - ref: 6
        name: 更新软件仓库缓存
        module: repo
        order: 6
        params: '{"action":"makecache"}'
      - ref: 7
        name: 安装系统基础工具套件
        module: package
        order: 7
        params: '{"action":"install","name":"wget,git,jq,bash-completion,ipvsadm,net-tools,conntrack,chrony,curl,tar,psmisc,vim,lvm2,ipset"}'
      - ref: 8
        name: 恢复系统原有软件源配置
        module: repo
        order: 8
        params: '{"action":"restore"}'
  - name: 集群时间同步服务部署(私有化集群无时间同步服务使用)
    description: 部署Chrony时间同步服务，首台Master作为时间服务端，其余节点同步主节点时间，关闭Ubuntu默认timesyncd，保障全集群时钟一致性
    machineGroup: k8s_cluster
    tasks:
      - ref: 1
        name: 停止Ubuntu默认systemd-timesyncd服务
        module: systemd
        order: 1
        params: '{"name":"systemd-timesyncd","action":"stop"}'
        when: '{{ .Machine.os_name }} contains ubuntu'
      - ref: 2
        name: 禁用Ubuntu默认systemd-timesyncd开机自启
        module: systemd
        order: 2
        params: '{"name":"systemd-timesyncd","action":"disable"}'
        when: '{{ .Machine.os_name }} contains ubuntu'
      - ref: 3
        name: 配置Master节点为Chrony时间服务端
        module: blockinfile
        order: 3
        params: '{"content":"local stratum 10    \ndriftfile /var/lib/chrony/drift    \nmakestep 1.0 3       \nrtcsync     \nallow 0.0.0.0/0\nkeyfile /etc/chrony.keys      \nleapsectz right/UTC        \nlogdir /var/log/chrony\n","path":"/etc/chrony.conf","action":"ensure"}'
        when: '{{ .Machine.ip }} == {{ (index .Groups.k8s_master0 0).ip }}'
        hooks:
          - restart_chronyd
      - ref: 4
        name: 启动Master节点chronyd服务
        module: systemd
        order: 4
        params: '{"name":"chronyd","action":"start"}'
        when: '{{ .Machine.ip }} == {{ (index .Groups.k8s_master0 0).ip }}'
      - ref: 5
        name: 配置节点同步Master节点时间
        module: blockinfile
        order: 5
        params: '{"content":"server {{ (index .Groups.k8s_master0 0).ip }} iburst\ndriftfile /var/lib/chrony/drift\nmakestep 1.0 3\nrtcsync\nkeyfile /etc/chrony.keys\nleapsectz right/UTC\nlogdir /var/log/chrony\n","path":"/etc/chrony.conf","action":"ensure"}'
        when: '{{ .Machine.ip }} != {{ (index .Groups.k8s_master0 0).ip }}'
        hooks:
          - restart_chronyd
      - ref: 6
        name: 启动节点chronyd时间同步服务
        module: systemd
        order: 6
        params: '{"action":"start","name":"chronyd"}'
        when: '{{ .Machine.ip }} != {{ (index .Groups.k8s_master0 0).ip }}'
      - ref: 7
        name: 测试节点chronyd时间同步服务
        module: systemd
        order: 7
        params: '{"name":"chronyd","action":"status"}'
  - name: 内核调优与系统资源限制
    description: 配置K8s所需内核参数、加载IPVS相关内核模块并配置开机自启、设置系统资源限制，满足容器运行与集群网络的内核性能要求
    machineGroup: k8s_cluster
    tasks:
      - ref: 1
        name: 配置K8s系统内核参数（sysctl.conf）
        module: blockinfile
        order: 1
        params: '{"action":"ensure","path":"/etc/sysctl.conf","content":"net.ipv4.ip_forward = 1\nnet.bridge.bridge-nf-call-iptables = 1\nfs.may_detach_mounts = 1\nvm.overcommit_memory=1\nvm.panic_on_oom=0\nfs.inotify.max_user_watches=89100\nfs.file-max=52706963\nfs.nr_open=52706963\nnet.netfilter.nf_conntrack_max=2310720\n\nnet.ipv4.tcp_keepalive_time = 600\nnet.ipv4.tcp_keepalive_probes = 3\nnet.ipv4.tcp_keepalive_intvl =15\nnet.ipv4.tcp_max_tw_buckets = 36000\nnet.ipv4.tcp_tw_reuse = 1\nnet.ipv4.tcp_max_orphans = 327680\nnet.ipv4.tcp_orphan_retries = 3\nnet.ipv4.tcp_syncookies = 1\nnet.ipv4.tcp_max_syn_backlog = 16384\nnet.ipv4.ip_conntrack_max = 65536\nnet.ipv4.tcp_max_syn_backlog = 16384\nnet.ipv4.tcp_timestamps = 0\nnet.core.somaxconn = 16384\n\nnet.ipv6.conf.all.disable_ipv6 = 0\nnet.ipv6.conf.default.disable_ipv6 = 0\nnet.ipv6.conf.lo.disable_ipv6 = 0\nnet.ipv6.conf.all.forwarding = 1\n"}'
        hooks:
          - reload sysctl parameters
      - ref: 2
        name: 加载IPVS相关内核模块
        module: modprobe
        order: 2
        params: '{"loop":"ip_vs,ip_vs_rr,ip_vs_wrr,ip_vs_sh,nf_conntrack","action":"load"}'
      - ref: 3
        name: 配置IPVS模块开机自动加载
        module: blockinfile
        order: 3
        params: '{"action":"ensure","path":"/etc/modules-load.d/ipvs.conf","content":"ip_vs\nip_vs_lc\nip_vs_wlc\nip_vs_rr\nip_vs_wrr\nip_vs_lblc\nip_vs_lblcr\nip_vs_dh\nip_vs_sh\nip_vs_nq\nip_vs_sed\nip_vs_ftp\nip_vs_sh\nnf_conntrack\nip_tables\nip_set\nxt_set\nipt_set\nipt_rpfilter\nipt_REJECT\nipip\n"}'
      - ref: 4
        name: 启动systemd-modules-load服务
        module: systemd
        order: 4
        params: '{"name":"systemd-modules-load.service","action":"start"}'
      - ref: 5
        name: 启用systemd-modules-load开机自启
        module: systemd
        order: 5
        params: '{"name":"systemd-modules-load.service","action":"enable"}'
      - ref: 6
        name: 配置系统用户资源限制
        module: blockinfile
        order: 6
        params: '{"action":"ensure","path":"/etc/security/limits.conf","content":"* soft nofile 655360\n* hard nofile 131072\n* soft nproc 655350\n* hard nproc 655350\n* soft memlock unlimited\n* hard memlock unlimited\n"}'
  - name: K8s Master 控制平面组件部署
    description: 批量部署所有 Master 节点，同步集群 PKI 证书，离线分发 k8s 服务二进制包，部署 apiserver/controller-manager/scheduler 三大控制平面 systemd 服务，配置 kubectl、helm 命令补全并同步管理员 kubeconfig 至 root 用户目录
    machineGroup: k8s_master
    tasks:
      - ref: 1
        name: 复制Kubernetes PKI证书目录到目标路径
        module: copy
        order: 1
        params: '{"src":"/etc/kubernetes/pki/","dest":"/etc/kubernetes/","type":"dir"}'
      - ref: 2
        name: 复制controller-manager.conf scheduler.conf bootstrap.secret.yaml到master节点
        module: copy
        order: 2
        params: '{"src":"/etc/kubernetes/{{.item}}","dest":"/etc/kubernetes/{{.item}}","type":"file","recursive":"","mode":""}'
        loop: '["controller-manager.conf","scheduler.conf","bootstrap.secret.yaml"]'
      - ref: 3
        name: '[K8s服务准备] 拉取kubernetes-server压缩包'
        module: file_pull
        order: 3
        params: '{"url":"{{ .Server.protocol }}://{{ .Server.ip }}:{{ .Server.port }}/download/kubernetes-server-v1.32.0-linux-amd64.tar.gz","md5":"8d870aa00542a27db561556451626d9d","dest":"{{ .GlobalVariable.base_pkg_dir }}/"}'
      - ref: 4
        name: '[自动补全配置] 拉取kubectl和helm补全脚本'
        module: template
        order: 4
        params: '{"src":"{{.item}}","content":"","dest":"/etc/bash_completion.d/{{.item}}","append":""}'
        loop: '["kubectl.sh","helm.sh"]'
      - ref: 5
        name: '[K8s服务准备] 解压kubernetes-server压缩包'
        module: unarchive
        order: 5
        params: '{"src":"{{ .GlobalVariable.base_pkg_dir }}/kubernetes-server-v1.32.0-linux-amd64.tar.gz","dest":"/usr/local/bin"}'
      - ref: 6
        name: '[控制平面服务配置] 生成kube-apiserver等服务文件'
        module: template
        order: 6
        params: '{"src":"{{.item}}","dest":"/etc/systemd/system/{{.item}}"}'
        hooks:
          - systemctl daemon-reload
        loop: '["kube-controller-manager.service","kube-apiserver.service","kube-scheduler.service"]'
      - ref: 7
        name: 启动kube-apiserver等控制平面服务
        module: systemd
        order: 7
        params: '{"name":"{{.item}}","action":"start"}'
        loop: '["kube-controller-manager.service","kube-apiserver.service","kube-scheduler.service"]'
      - ref: 8
        name: 设置kube-apiserver等控制平面服务开机自启
        module: systemd
        order: 8
        params: '{"name":"{{.item}}","action":"enable"}'
        loop: '["kube-controller-manager.service","kube-apiserver.service","kube-scheduler.service"]'
      - ref: 9
        name: 复制kubeconfig配置到用户目录
        module: copy
        order: 9
        params: '{"src":"/etc/kubernetes/admin.conf","dest":"/root/.kube/config"}'
      - ref: 10
        name: 测试kube-apiserver等控制平面服务状态
        module: systemd
        order: 10
        params: '{"name":"{{.item}}","action":"status"}'
        loop: '["kube-controller-manager.service","kube-apiserver.service","kube-scheduler.service"]'
  - name: K8s Node节点组件部署
    description: 对全集群所有节点进行Node节点初始化，同步集群根证书、ETCD证书、kubelet与kube-proxy授权配置，离线部署node端二进制组件，生成节点运行配置与systemd服务，启动并常驻kubelet、kube-proxy节点核心服务，完成集群节点准入准备
    machineGroup: k8s_cluster
    tasks:
      - ref: 1
        name: 创建Kubernetes证书目录
        module: file
        order: 1
        params: '{"path":"{{.item}}","type":"directory","action":"create"}'
        loop: '["/etc/kubernetes/pki","/etc/kubernetes/pki/etcd"]'
      - ref: 2
        name: 复制根证书文件到PKI目录
        module: copy
        order: 2
        params: '{"src":"/etc/kubernetes/pki/{{.item}}","dest":"/etc/kubernetes/pki/{{.item}}"}'
        loop: '["ca.pem","ca-key.pem","front-proxy-ca.pem"]'
      - ref: 3
        name: 复制etcd证书文件到PKI目录
        module: copy
        order: 3
        params: '{"src":"/etc/kubernetes/pki/etcd/{{.item}}","dest":"/etc/kubernetes/pki/etcd/{{.item}}"}'
        loop: '["ca.pem","etcd.pem","etcd-key.pem"]'
      - ref: 4
        name: 复制kube-proxy和kubelet配置文件
        module: copy
        order: 4
        params: '{"src":"/etc/kubernetes/{{.item}}","dest":"/etc/kubernetes/{{.item}}"}'
        loop: '["kube-proxy.conf","bootstrap-kubelet.conf"]'
      - ref: 5
        name: '[包准备] 拉取kubernetes-node压缩包'
        module: file_pull
        order: 5
        params: '{"url":"{{ .Server.protocol }}://{{ .Server.ip }}:{{ .Server.port }}/download/kubernetes-node-v1.32.0-linux-amd64.tar.gz","md5":"d9b97c1035e086d43bf67c6aa3ea12eb","dest":"{{ .GlobalVariable.base_pkg_dir }}/"}'
      - ref: 6
        name: '[包准备] 解压kubernetes-node压缩包'
        module: unarchive
        order: 6
        params: '{"src":"{{ .GlobalVariable.base_pkg_dir }}/kubernetes-node-v1.32.0-linux-amd64.tar.gz","dest":"/usr/local/bin"}'
      - ref: 7
        name: '[系统服务配置] 生成kubelet和kube-proxy服务文件'
        module: template
        order: 7
        params: '{"src":"{{.item}}","dest":"/etc/systemd/system/{{.item}}"}'
        hooks:
          - systemctl daemon-reload
        loop: '["kubelet.service","kube-proxy.service"]'
      - ref: 8
        name: '[Kubelet配置] 生成kubelet配置文件'
        module: template
        order: 8
        params: '{"src":"kubelet-conf.yml","dest":"/etc/kubernetes/kubelet-conf.yml"}'
        hooks:
          - restart kubelet
      - ref: 9
        name: '[Kube-proxy配置] 生成kube-proxy配置文件'
        module: template
        order: 9
        params: '{"src":"kube-proxy.yml","dest":"/etc/kubernetes/kube-proxy.yml"}'
        hooks:
          - restart kube-proxy
      - ref: 10
        name: 启动kubelet和kube-proxy服务
        module: systemd
        order: 10
        params: '{"action":"start","name":"{{.item}}"}'
        loop: '["kubelet","kube-proxy"]'
      - ref: 11
        name: 设置kubelet和kube-proxy服务开机自启
        module: systemd
        order: 11
        params: '{"action":"enable","name":"{{.item}}"}'
        loop: '["kubelet","kube-proxy"]'
      - ref: 12
        name: 测试kubelet和kube-proxy服务状态
        module: systemd
        order: 12
        params: '{"name":"{{.item}}","action":"status"}'
        loop: '["kubelet","kube-proxy"]'
      - ref: 13
        name: 创建K8s集群所需目录
        module: file
        order: 13
        params: '{"path":"{{.item}}","action":"create","type":"directory"}'
        loop: '["/etc/kubernetes/manifests/","/etc/systemd/system/kubelet.service.d","/var/log/calico/cni","/etc/cni/net.d","/var/lib/cni/networks"]'
  - name: 集群初始化
    machineGroup: k8s_master0
    tasks:
      - ref: 1
        name: '[集群初始化] 应用bootstrap secret配置'
        module: shell
        order: 1
        params: '{"command":"kubectl apply --kubeconfig=/root/.kube/config  -f /etc/kubernetes/bootstrap.secret.yaml"}'
      - ref: 2
        name: '[网络配置] 生成calico.yaml配置文件'
        module: template
        order: 2
        params: '{"src":"calico.yaml","dest":"/etc/kubernetes/calico.yaml"}'
      - ref: 3
        name: '[网络部署] 应用calico.yaml部署Calico网络'
        module: shell
        order: 3
        params: '{"command":"kubectl apply --kubeconfig=/root/.kube/config  -f /etc/kubernetes/calico.yaml"}'
      - ref: 4
        name: '[插件准备] 拉取CoreDNS配置及部署脚本'
        module: template
        order: 4
        params: '{"src":"{{.item}}","content":"","dest":"{{ .GlobalVariable.base_pkg_dir }}/{{.item}}","append":""}'
        loop: '["coredns.yaml.sed","deploy.sh"]'
      - ref: 5
        name: '[插件部署] 执行脚本部署CoreDNS'
        module: shell
        order: 5
        params: '{"command":"cd {{ .GlobalVariable.base_pkg_dir }}&& bash deploy.sh -s -i {{ .GlobalVariable.clusterdns }}| kubectl apply --kubeconfig=/root/.kube/config  -f -"}'
      - ref: 6
        name: 测试节点状态
        module: script
        order: 6
        params: '{"script":"{{ $expectNodeCount := len .Groups.k8s_cluster }}\n#!/bin/bash\nset -e\nexport KUBECONFIG=/root/.kube/config\n# 预期节点数量，由模板注入\nEXPECT_COUNT={{ $expectNodeCount }}\n# 获取集群实际就绪节点个数\nREAL_COUNT=$(kubectl get nodes -o jsonpath=''{range .items[*]}{.metadata.name} {.status.conditions[?(@.type==\"Ready\")].status}{\"\\n\"}{end}'' | grep \"True\" | wc -l)\necho \"预期节点数: $EXPECT_COUNT\"\necho \"实际节点数: $REAL_COUNT\"\nif [ \"$REAL_COUNT\" -ne \"$EXPECT_COUNT\" ];then\n  echo \"节点数量不匹配！预期$EXPECT_COUNT，当前集群只有$REAL_COUNT个node\"\n  exit 1\nfi\necho \"节点数量校验通过\"","script_file":""}'
        retries: 10
        delay: 10
      - ref: 7
        name: '[节点配置] 为master节点添加角色标签'
        module: shell
        order: 7
        params: '{"command":"for host in {{ range .Groups.k8s_master }}{{ .hostname }} {{ end }}; do  kubectl label node $host --kubeconfig=/root/.kube/config node-role.kubernetes.io/master='''' --overwrite ;done"}'
      - ref: 8
        name: '[节点配置] 为worker节点添加角色标签'
        module: shell
        order: 8
        params: '{"command":"for host in {{ range .Groups.k8s_cluster }}{{ .hostname }} {{ end }}; do  kubectl label node $host --kubeconfig=/root/.kube/config node-role.kubernetes.io/worker='''' --overwrite ;done"}'
  - name: 部署前基础校验
    description: 检查主机名、网关等基础环境
    machineGroup: k8s_cluster
    tasks:
      - ref: 1
        name: 执行前置检查脚本
        module: script
        order: 1
        params: '{"script":"#!/bin/bash\n# 脚本：precheck.sh\n# 用途：校验集群节点主机名是否重复/非法，检查默认网关是否存在，并检查是否已安装过K8s\n\nset -e\n\n# ----- 1. 主机名校验（检查 k8s_cluster 组所有节点） -----\nCLUSTER_HOSTS=\"{{ range .Groups.k8s_cluster }}{{ .hostname }} {{ end }}\"\n\nif [ -z \"$CLUSTER_HOSTS\" ]; then\n    echo \"错误：k8s_cluster 组为空，请至少定义一台节点\"\n    exit 1\nfi\n\n# 检查是否有重复\nDUPS=$(echo \"$CLUSTER_HOSTS\" | tr '' '' ''\\n'' | sort | uniq -d)\nif [ -n \"$DUPS\" ]; then\n    echo \"错误：集群节点主机名存在重复：$DUPS\"\n    exit 1\nfi\n\n# 检查是否有 localhost 或 localhost.localdomain\nfor host in $CLUSTER_HOSTS; do\n    if [[ \"$host\" == \"localhost\" || \"$host\" == \"localhost.localdomain\" ]]; then\n        echo \"错误：节点主机名不能为 localhost 或 localhost.localdomain，当前为：$host\"\n        exit 1\n    fi\ndone\n\necho \"✓ 集群节点主机名校验通过\"\n\n# ----- 2. 默认网关检查（本机） -----\nif ip route | grep -q \"^default\"; then\n    GATEWAY=$(ip route | grep \"^default\" | awk ''{print $3}'')\n    echo \"✓ 默认网关存在：$GATEWAY\"\nelse\n    echo \"错误：未找到默认网关（default gateway），请检查网络配置\"\n    exit 1\nfi\n\n# ----- 3. 检查本机是否已安装过 Kubernetes（目录 /etc/kubernetes 存在）-----\nif [ -d \"/etc/kubernetes\" ]; then\n    echo \"错误：本机 /etc/kubernetes 目录已存在，可能已经部署过 K8s 集群。为避免冲突，请清理后再部署。\"\n    exit 1\nfi\n\necho \"✓ 本机未检测到已有 K8s 安装\"\n\necho \"所有前置检查通过\"","script_file":""}'
workflows:
  - name: k8s-deploy-1.32
    stageGroups:
      - name: 阶段组 1
        order: 1
        mode: sequential
        stages:
          - name: 系统基础初始化
            description: 关闭系统防火墙、禁用SELinux、永久关闭Swap分区
            order: 1
            machineGroup: k8s_cluster
            tasks:
              - ref: 1
                name: 关闭firewalld开机自启动（非Ubuntu系统）
                module: systemd
                params: '{"name":"firewalld","action":"disable"}'
                order: 1
                when: '{{ .Machine.os_name }} !contains ubuntu'
              - ref: 2
                name: 停止firewalld服务（非Ubuntu系统）
                module: systemd
                params: '{"name":"firewalld","action":"stop"}'
                order: 2
                when: '{{ .Machine.os_name }} !contains ubuntu'
              - ref: 3
                name: 关闭ufw开机自启动（Ubuntu系统）
                module: systemd
                params: '{"name":"ufw","action":"disable"}'
                order: 3
                when: '{{ .Machine.os_name }} contains ubuntu'
              - ref: 4
                name: 停止ufw服务（Ubuntu系统）
                module: systemd
                params: '{"name":"ufw","action":"stop"}'
                order: 4
                when: '{{ .Machine.os_name }} contains ubuntu'
              - ref: 5
                name: 禁用SELinux开机自启动（永久生效）
                module: selinux
                params: '{"action":"disabled"}'
                order: 5
              - ref: 6
                name: 临时设置SELinux为Permissive模式
                module: selinux
                params: '{"action":"set_permissive"}'
                order: 6
              - ref: 7
                name: 临时关闭Swap分区
                module: shell
                params: '{"command":"swapoff -a"}'
                order: 7
                when: '{{ .Machine.swap_kb }} != 0'
              - ref: 8
                name: 注释/etc/fstab中Swap配置（永久禁用）
                module: lineinfile
                params: '{"path":"/etc/fstab","regexp":"^(.*swap.*)$","line":"#$1","action":"replace","backrefs":"true"}'
                order: 8
          - name: 集群网络互通配置
            description: 配置集群节点hosts主机名解析、适配Calico网络的NetworkManager规则、修复Ubuntu系统DNS配置，保障集群内部网络互通与CNI插件兼容性
            order: 2
            machineGroup: k8s_cluster
            tasks:
              - ref: 9
                name: 写入集群节点hosts主机名解析
                module: blockinfile
                params: '{"path":"/etc/hosts","content":"{{ range $index, $value := .Groups.k8s_cluster }}\n{{ $value.ip }} {{ $value.hostname }}\n{{- end }}\n{{ (index .Groups.k8s_master0 0).ip }} registry.pf.com","action":"ensure"}'
                order: 1
              - ref: 10
                name: 配置NetworkManager忽略Calico网络接口（非Ubuntu系统）
                module: blockinfile
                params: '{"action":"ensure","path":"/etc/NetworkManager/conf.d/calico.conf","content":"[keyfile]\nunmanaged-devices=interface-name:cali*;interface-name:tunl*\n"}'
                order: 2
                when: '{{ .Machine.os_name }} !contains ubuntu'
                hooks:
                  - restart_NetworkManager
              - ref: 11
                name: 删除Ubuntu默认resolv.conf软链接
                module: file
                params: '{"path":"/etc/resolv.conf","action":"delete"}'
                order: 3
                when: '{{ .Machine.os_name }} contains ubuntu'
              - ref: 12
                name: 重建Ubuntu真实DNS配置软链接
                module: file
                params: '{"src":"/run/systemd/resolve/resolv.conf","path":"/etc/resolv.conf","action":"symlink","type":"file"}'
                order: 4
                when: '{{ .Machine.os_name }} contains ubuntu'
          - name: 本地离线软件仓库及nginx部署
            description: 部署Nginx静态文件服务、解压离线软件仓库包，搭建麒麟与Ubuntu双系统本地离线软件源，为后续全链路离线安装提供软件包分发支撑
            order: 3
            machineGroup: k8s_cluster
            tasks:
              - ref: 13
                name: 拉取Nginx基础软件包（Kylin系统）
                module: file_pull
                params: '{"url":"{{ .Server.protocol }}://{{ .Server.ip }}:{{ .Server.port }}/download/{{ .GlobalVariable.nginx_rpm_pkg }}","md5":"c2b8627bb1efaee4536474d7c0513efd","dest":"{{ .GlobalVariable.base_pkg_dir }}/"}'
                order: 1
                when: '{{ .Machine.os_name }} !contains ubuntu'
              - ref: 14
                name: 拉取Nginx基础软件包（Ubuntu系统）
                module: file_pull
                params: '{"url":"{{ .Server.protocol }}://{{ .Server.ip }}:{{ .Server.port }}/download/{{ .GlobalVariable.ubuntu_nginx_pkg }}","md5":"3267b43c8ac7c2483ace26e1831c2143","dest":"{{ .GlobalVariable.base_pkg_dir }}/"}'
                order: 2
                when: '{{ .Machine.os_name }} contains ubuntu'
              - ref: 15
                name: 拉取离线软件仓库包
                module: file_pull
                params: '{"url":"{{ .Server.protocol }}://{{ .Server.ip }}:{{ .Server.port }}/download/{{ .GlobalVariable.repo_pkg }}","md5":"ed340b85facff3cd390a1054ba33060b","dest":"{{ .GlobalVariable.repository_dir }}/"}'
                order: 3
              - ref: 16
                name: 解压Nginx软件包（Ubuntu系统）
                module: unarchive
                params: '{"src":"{{ .GlobalVariable.base_pkg_dir }}/{{ .GlobalVariable.ubuntu_nginx_pkg }}","dest":"/usr/local"}'
                order: 4
                when: '{{ .Machine.os_name }} contains ubuntu'
              - ref: 17
                name: 安装Nginx服务（Kylin系统）
                module: package
                params: '{"action":"localinstall","name":"{{ .GlobalVariable.base_pkg_dir }}/{{ .GlobalVariable.nginx_rpm_pkg }}"}'
                order: 5
                when: '{{ .Machine.os_name }} contains kylin'
              - ref: 18
                name: 解压离线软件仓库包
                module: unarchive
                params: '{"src":"{{ .GlobalVariable.repository_dir }}/{{ .GlobalVariable.repo_pkg }}","dest":"{{ .GlobalVariable.repository_dir }}"}'
                order: 6
              - ref: 19
                name: 部署kube-nginx.conf配置文件
                module: template
                params: '{"src":"repo-nginx.conf","dest":"/usr/local/nginx/conf/kube-nginx.conf"}'
                order: 7
                hooks:
                  - restart_kube-nginx
              - ref: 20
                name: 部署k8s-apiserver-lb配置文件
                module: template
                params: '{"src":"k8s-apiserver-lb.conf","content":"","dest":"/usr/local/nginx/conf/kube-nginx.conf","append":"true"}'
                order: 8
                hooks:
                  - restart_kube-nginx
              - ref: 21
                name: 部署kube-nginx systemd服务文件
                module: template
                params: '{"src":"kube-nginx.service","content":"","dest":"/etc/systemd/system/kube-nginx.service","append":""}'
                order: 9
                hooks:
                  - systemctl daemon-reload
              - ref: 22
                name: 启动kube-nginx服务
                module: systemd
                params: '{"action":"start","name":"kube-nginx"}'
                order: 10
              - ref: 23
                name: 启用kube-nginx开机自启
                module: systemd
                params: '{"action":"enable","name":"kube-nginx"}'
                order: 11
              - ref: 24
                name: 测试kube-nginx状态
                module: systemd
                params: '{"name":"kube-nginx","action":"status"}'
                order: 12
          - name: 安装系统基础工具套件（私有化环境无软件源可用时）
            description: 适用于私有化环境无软件源可用场景，备份系统原有源、添加本地离线软件源、更新缓存并安装集群运维基础工具套件，安装完成后自动恢复源配置，适配麒麟与Ubuntu双系统
            order: 4
            machineGroup: k8s_cluster
            tasks:
              - ref: 25
                name: 测试本地YUM仓库可用性（Kylin系统）
                module: repo
                params: '{"action":"test","url":"http://{{ (index .Groups.k8s_master0 0).ip }}:{{ .GlobalVariable.repository_port }}/rpms/KylinV10SP3-2403/"}'
                order: 1
                when: '{{ .Machine.os_name }} contains kylin'
              - ref: 26
                name: 测试本地APT仓库可用性（Ubuntu系统）
                module: repo
                params: '{"action":"test","url":"http://{{ (index .Groups.k8s_master0 0).ip }}:{{ .GlobalVariable.repository_port }}/debs/Ubuntu2204/"}'
                order: 2
                when: '{{ .Machine.os_name }} contains ubuntu'
              - ref: 27
                name: 备份系统原有软件源配置
                module: repo
                params: '{"action":"backup"}'
                order: 3
              - ref: 28
                name: 添加K8s本地APT源（Ubuntu系统）
                module: repo
                params: '{"name":"k8s_repo","action":"add","url":"http://{{ (index .Groups.k8s_master0 0).ip }}:{{ .GlobalVariable.repository_port }}/debs/Ubuntu2204"}'
                order: 4
                when: '{{ .Machine.os_name }} contains ubuntu'
              - ref: 29
                name: 添加K8s本地YUM源（Kylin系统）
                module: repo
                params: '{"name":"k8s_repo","action":"add","url":"http://{{ (index .Groups.k8s_master0 0).ip }}:{{ .GlobalVariable.repository_port }}/rpms/KylinV10SP3-2403"}'
                order: 5
                when: '{{ .Machine.os_name }} contains kylin'
              - ref: 30
                name: 更新软件仓库缓存
                module: repo
                params: '{"action":"makecache"}'
                order: 6
              - ref: 31
                name: 安装系统基础工具套件
                module: package
                params: '{"action":"install","name":"wget,git,jq,bash-completion,ipvsadm,net-tools,conntrack,chrony,curl,tar,psmisc,vim,lvm2,ipset"}'
                order: 7
              - ref: 32
                name: 恢复系统原有软件源配置
                module: repo
                params: '{"action":"restore"}'
                order: 8
          - name: 集群时间同步服务部署(私有化集群无时间同步服务使用)
            description: 部署Chrony时间同步服务，首台Master作为时间服务端，其余节点同步主节点时间，关闭Ubuntu默认timesyncd，保障全集群时钟一致性
            order: 5
            machineGroup: k8s_cluster
            tasks:
              - ref: 33
                name: 停止Ubuntu默认systemd-timesyncd服务
                module: systemd
                params: '{"name":"systemd-timesyncd","action":"stop"}'
                order: 1
                when: '{{ .Machine.os_name }} contains ubuntu'
              - ref: 34
                name: 禁用Ubuntu默认systemd-timesyncd开机自启
                module: systemd
                params: '{"name":"systemd-timesyncd","action":"disable"}'
                order: 2
                when: '{{ .Machine.os_name }} contains ubuntu'
              - ref: 35
                name: 配置Master节点为Chrony时间服务端
                module: blockinfile
                params: '{"content":"local stratum 10    \ndriftfile /var/lib/chrony/drift    \nmakestep 1.0 3       \nrtcsync     \nallow 0.0.0.0/0\nkeyfile /etc/chrony.keys      \nleapsectz right/UTC        \nlogdir /var/log/chrony\n","path":"/etc/chrony.conf","action":"ensure"}'
                order: 3
                when: '{{ .Machine.ip }} == {{ (index .Groups.k8s_master0 0).ip }}'
                hooks:
                  - restart_chronyd
              - ref: 36
                name: 启动Master节点chronyd服务
                module: systemd
                params: '{"name":"chronyd","action":"start"}'
                order: 4
                when: '{{ .Machine.ip }} == {{ (index .Groups.k8s_master0 0).ip }}'
              - ref: 37
                name: 配置节点同步Master节点时间
                module: blockinfile
                params: '{"content":"server {{ (index .Groups.k8s_master0 0).ip }} iburst\ndriftfile /var/lib/chrony/drift\nmakestep 1.0 3\nrtcsync\nkeyfile /etc/chrony.keys\nleapsectz right/UTC\nlogdir /var/log/chrony\n","path":"/etc/chrony.conf","action":"ensure"}'
                order: 5
                when: '{{ .Machine.ip }} != {{ (index .Groups.k8s_master0 0).ip }}'
                hooks:
                  - restart_chronyd
              - ref: 38
                name: 启动节点chronyd时间同步服务
                module: systemd
                params: '{"action":"start","name":"chronyd"}'
                order: 6
                when: '{{ .Machine.ip }} != {{ (index .Groups.k8s_master0 0).ip }}'
              - ref: 39
                name: 测试节点chronyd时间同步服务
                module: systemd
                params: '{"name":"chronyd","action":"status"}'
                order: 7
          - name: 内核调优与系统资源限制
            description: 配置K8s所需内核参数、加载IPVS相关内核模块并配置开机自启、设置系统资源限制，满足容器运行与集群网络的内核性能要求
            order: 6
            machineGroup: k8s_cluster
            tasks:
              - ref: 40
                name: 配置K8s系统内核参数（sysctl.conf）
                module: blockinfile
