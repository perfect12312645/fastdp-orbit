                name: '[私有仓库] 启动registry容器'
                module: script
                params: '{"script":"# 检查运行中的registry容器\nif [ -z \"$(docker ps -q --filter ''name=^/registry$'' --filter ''status=running'')\" ]; then\n  # 不存在则启动容器\n  docker run -d -p 5000:5000 --name registry \\\n    --restart=always \\\n    -v {{ .GlobalVariable.docker_registry_data }}:/var/lib/registry \\\n    registry.pf.com:5000/registry\n  echo \"等待容器启动（3秒后检查）...\"\n  sleep 3\n  if [ -n \"$(docker ps -q --filter ''name=^/registry$'' --filter ''status=running'')\" ]; then\n    echo \"registry容器启动成功\"\n    exit 0\n  else\n    echo \"错误：registry容器启动失败（3秒内未进入运行状态）\"\n    echo \"容器日志：\"\n    docker logs registry 2>&1\n    exit 1\n  fi\nelse\n  echo \"registry容器已运行\"\n  exit 0\nfi\n"}'
